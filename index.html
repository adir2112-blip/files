<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוקד מובמנט — מערכת קבצים</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='14' font-family='Arial' fill='white' font-weight='900'%3EM%3E%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--surface:#fff;--surface2:#f5f7fc;--border:#e2e6ef;--border2:#c8cfe0;
  --text:#1a1f36;--text2:#5a6380;--text3:#9198b0;
  --blue:#2563eb;--blue-light:#eff4ff;--blue-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;--purple:#7c3aed;--purple-light:#f5f3ff;
  --black:#111;
  --radius:12px;--radius-sm:8px;--radius-xs:5px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.13);
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

/* ══ LOGIN ══ */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;overflow:hidden;background:#0d1635}
#login-bg-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.login-wrap{width:100%;max-width:420px;position:relative;z-index:2}
@keyframes fadeUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-card{background:rgba(235,240,255,0.92);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:36px 32px;box-shadow:0 8px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9);animation:fadeUp .35s ease;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.login-header{text-align:center;margin-bottom:28px}
.login-movement-logo{display:flex;align-items:center;justify-content:center;margin-bottom:14px;animation:float 5s ease-in-out infinite}
.login-subtitle{font-size:13px;color:rgba(30,50,120,.55);margin-top:4px}
.login-divider{height:1px;background:rgba(30,60,180,.15);margin:20px 0}
.login-section-title{font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mode-btns{display:flex;flex-direction:column;gap:10px}
.mode-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid rgba(30,80,200,.15);border-radius:14px;background:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:#1e3a8a;transition:all .22s;text-align:right;width:100%}
.mode-btn:hover{border-color:rgba(37,99,235,.5);background:rgba(255,255,255,.85);transform:translateX(-3px) translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.15)}
.mode-btn .mb-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.mode-btn.agent-btn .mb-icon{background:linear-gradient(135deg,#2563eb,#3b82f6);box-shadow:0 4px 14px rgba(37,99,235,.55)}
.mode-btn.manager-btn .mb-icon{background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 14px rgba(124,58,237,.55)}
.mode-btn .mb-sub{font-size:12px;font-weight:400;color:rgba(30,58,138,.5);margin-top:2px}
.mode-btn .mb-chevron{margin-right:auto;color:rgba(30,58,138,.3);font-size:16px;transition:all .22s}
.mode-btn:hover .mb-chevron{transform:translateX(-4px);color:#2563eb}
.login-back{background:none;border:none;cursor:pointer;font-size:13px;color:rgba(30,58,138,.5);font-family:inherit;display:flex;align-items:center;gap:5px;margin-bottom:18px;padding:0;transition:color .15s}
.login-back:hover{color:#1e3a8a}
.agent-search-wrap{position:relative;margin-bottom:8px}
.agent-search-wrap .ti{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:rgba(30,58,138,.4);font-size:16px;pointer-events:none}
.agent-search-wrap input{padding-right:36px;width:100%;padding-top:10px;padding-bottom:10px;border:1px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:rgba(255,255,255,.7);color:#1e3a8a;transition:all .15s}
.agent-search-wrap input::placeholder{color:rgba(30,58,138,.4)}
.agent-search-wrap input:focus{outline:none;border-color:rgba(99,136,255,.55);background:rgba(255,255,255,.11);box-shadow:0 0 0 3px rgba(37,99,235,.18)}
.agent-list{max-height:210px;overflow-y:auto;border:1px solid rgba(30,80,200,.15);border-radius:var(--radius-sm);background:rgba(255,255,255,.75);scrollbar-width:thin}
.agent-list-item{padding:10px 14px;cursor:pointer;font-size:14px;font-weight:500;color:#1e3a8a;border-bottom:1px solid rgba(30,80,200,.08);display:flex;align-items:center;gap:10px;transition:background .12s;user-select:none}
.agent-list-item:last-child{border-bottom:none}
.agent-list-item:hover{background:rgba(37,99,235,.12);color:#1d4ed8}
.agent-list-empty{padding:24px;text-align:center;color:rgba(30,58,138,.4);font-size:13px}
.ali-avatar{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.selected-chip{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(37,99,235,.1);border:1.5px solid rgba(37,99,235,.3);border-radius:var(--radius-sm);margin-bottom:18px}
.selected-chip .sc-name{font-weight:700;color:#1d4ed8;font-size:15px;flex:1}
.selected-chip .sc-change{font-size:12px;color:#2563eb;cursor:pointer;text-decoration:underline;white-space:nowrap}
.pin-label{font-size:12px;font-weight:600;color:rgba(30,58,138,.55);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:4px}
.pin-digit{width:60px;height:68px;border:2px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);font-size:28px;font-weight:800;text-align:center;background:rgba(255,255,255,.7);color:#1e3a8a;font-family:inherit;transition:all .15s}
.pin-digit:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:rgba(30,58,138,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-group input{width:100%;background:rgba(255,255,255,.7);border:1px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);color:#1e3a8a;font-size:14px;padding:11px 13px;font-family:inherit;transition:all .15s}
.form-group input::placeholder{color:rgba(30,58,138,.35)}
.form-group input:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.login-btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.login-btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 4px 18px rgba(37,99,235,.45)}
.login-btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 28px rgba(37,99,235,.55)}
.login-btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.login-err{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c;font-weight:600;margin-bottom:14px;display:none;align-items:center;gap:8px}
/* ══ APP ══ */
#app-screen{display:none}
.topbar{background:var(--black);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-date{font-size:12px;color:rgba(255,255,255,.45)}
.agent-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:13px;color:rgba(255,255,255,.9)}
.agent-chip .ti{font-size:14px;opacity:.7}
.topbar-actions{display:flex;align-items:center;gap:8px}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);margin-bottom:18px;flex-wrap:wrap}
.breadcrumb .bc-link{cursor:pointer;color:var(--blue);font-weight:500}.breadcrumb .bc-link:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:28px 20px}
.container.full-width{max-width:none;padding:28px 24px}

/* page title */
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.04em}
.card-title .ti{color:var(--blue);font-size:16px}

/* ORG GRID */
.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.org-card{border-radius:var(--radius);padding:0;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);overflow:visible;border:2px solid transparent;position:relative}
.notif-badge{position:absolute;top:8px;left:8px;min-width:24px;height:24px;padding:0 7px;border-radius:20px;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);z-index:10;animation:badgePop .2s cubic-bezier(.34,1.56,.64,1)}
.notif-badge.red{background:#dc2626}
.notif-badge.orange{background:#ea580c}
.notif-badge.dual{display:flex;gap:0;padding:0;overflow:hidden}
.notif-badge.dual span{padding:0 6px}
@keyframes badgePop{from{transform:scale(0)}to{transform:scale(1)}}
.org-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:rgba(255,255,255,.4)}
.org-card-body{padding:20px 18px 16px;border-radius:calc(var(--radius) - 2px);overflow:hidden}
.org-card-banner{height:8px;width:100%}
.org-card .oc-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.org-card .oc-count{font-size:12px;color:rgba(255,255,255,.7)}
.org-card .oc-logo{width:48px;height:48px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2)}
.pending-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.95);color:#b91c1c;border-radius:20px;font-size:11px;font-weight:700;padding:3px 9px;margin-top:8px}
.admin-alert-bar{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(217,119,6,.1)}
.aab-title{font-weight:700;color:#92400e;font-size:14px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.aab-items{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.aab-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border:1px solid #fcd34d;border-radius:20px;font-size:13px;color:#78350f;cursor:pointer;transition:background .12s;font-weight:500}
.aab-chip:hover{background:#fef3c7}

/* FILE GRID */
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.file-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 14px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.file-card:hover{border-color:var(--blue);background:var(--blue-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.file-card .fc-icon{font-size:30px;color:var(--blue);margin-bottom:10px;display:block}
.file-card .fc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.file-card .fc-pending{display:inline-flex;align-items:center;gap:3px;background:#fee2e2;color:#b91c1c;border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;margin-top:7px}

/* FORMS */
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.form-input{cursor:pointer}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── ENTRY FORM (NICE) ── */
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06),0 10px 40px rgba(0,0,0,.06)}
.entry-hero{background:linear-gradient(135deg,#0f172a 0%,#1e293b 55%,#1d2a52 100%);padding:28px 30px 24px;position:relative;overflow:hidden}
.entry-hero::before{content:'';position:absolute;top:-40%;left:-10%;width:300px;height:300px;background:radial-gradient(circle,rgba(37,99,235,.35),transparent 70%);pointer-events:none}
.entry-hero::after{content:'';position:absolute;bottom:-50%;right:-10%;width:260px;height:260px;background:radial-gradient(circle,rgba(124,58,237,.3),transparent 70%);pointer-events:none}
.entry-hero-top{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.entry-hero-icon{width:52px;height:52px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;flex-shrink:0}
.entry-hero-title{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.2px}
.entry-hero-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.entry-hero-actions{display:flex;gap:8px;position:relative;z-index:1}
.entry-hero-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.entry-hero-btn:hover{background:rgba(255,255,255,.18);transform:translateY(-1px)}
.entry-hero-btn.green{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.3);color:#86efac}
.entry-hero-btn.green:hover{background:rgba(34,197,94,.28)}

.entry-body{padding:26px 30px 28px}

.entry-section-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.entry-section-title:not(:first-child){margin-top:26px}
.entry-section-title .ti{font-size:13px;color:var(--blue)}

.entry-field{position:relative;margin-bottom:14px}
.entry-field-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.entry-field-label .ti{font-size:13px;color:var(--text3)}
.entry-field-label .req-star{color:var(--red);font-weight:800}
.entry-input-wrap{position:relative}
.entry-input-wrap .field-icon{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;transition:color .15s}
.entry-input{width:100%;padding:12px 40px 12px 14px;border:1.5px solid var(--border2);border-radius:11px;background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;transition:all .18s}
.entry-input:focus{outline:none;border-color:var(--blue);background:var(--surface);box-shadow:0 0 0 4px rgba(37,99,235,.08)}
.entry-input:focus ~ .field-icon, .entry-input-wrap:focus-within .field-icon{color:var(--blue)}
.entry-input::placeholder{color:var(--text3);opacity:.7}
select.entry-input{cursor:pointer;padding-left:36px}
.entry-checkbox-row{display:flex;align-items:center;gap:10px;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:11px;cursor:pointer;transition:all .15s}
.entry-checkbox-row:hover{border-color:var(--blue);background:var(--blue-light)}
.entry-checkbox-row input{width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.entry-checkbox-row span{font-size:14px;color:var(--text);font-weight:500}
.entry-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.field-chat-dot{position:absolute;top:8px;left:8px;width:9px;height:9px;background:var(--blue);border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(37,99,235,.4);animation:chatPulse 2s ease-in-out infinite}
@keyframes chatPulse{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.4)}50%{box-shadow:0 0 0 5px rgba(37,99,235,0)}}

.chat-popup{position:fixed;z-index:500;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.18);overflow:hidden;animation:chatPopIn .18s ease}
@keyframes chatPopIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.chat-popup-header{background:linear-gradient(135deg,#1e293b,#2563eb);padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.chat-popup-title{color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.chat-popup-close{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;line-height:1;padding:0}
.chat-popup-close:hover{color:#fff}
.chat-messages{max-height:220px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;background:var(--surface2)}
.chat-msg{padding:8px 11px;border-radius:12px;font-size:12px;max-width:85%;line-height:1.4;word-break:break-word}
.chat-msg.agent{background:#fff;border:1px solid var(--border);align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg.manager{background:linear-gradient(135deg,#eff4ff,#f5f3ff);border:1px solid #c4b5fd;align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg-meta{font-size:10px;color:var(--text3);margin-top:3px}
.chat-input-row{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--border);background:var(--surface)}
.chat-input-row input{flex:1;padding:8px 11px;border:1px solid var(--border2);border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.chat-input-row input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.chat-send-btn{width:34px;height:34px;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.chat-send-btn:hover{background:var(--blue-dark)}

.entry-field-note{display:flex;align-items:flex-start;gap:8px;margin-top:8px;padding:10px 12px;background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1.5px solid #fcd34d;border-right:4px solid #d97706;border-radius:8px;animation:noteAppear .2s ease}
.entry-field-note .ti{color:#b45309;font-size:16px;flex-shrink:0;margin-top:1px}
.entry-field-note span{font-size:12.5px;color:#78350f;font-weight:600;line-height:1.5}
@keyframes noteAppear{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}


.entry-submit-bar{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}

.entry-submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,23,42,.35)}
.entry-submit-btn:active{transform:scale(.98)}
.entry-submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.entry-agent-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2);font-weight:500}

}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-black{background:var(--black);border-color:var(--black);color:#fff}.btn-black:hover{background:#333}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-sm{padding:5px 12px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:rgba(255,255,255,.8)}.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}

/* BADGES / TAGS */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.badge-success{background:var(--green-light);color:#15803d}
.badge-warning{background:var(--amber-light);color:var(--amber)}
.badge-info{background:var(--blue-light);color:var(--blue-dark)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-purple{background:var(--purple-light);color:var(--purple)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2)}
.tag-blue{background:var(--blue-light);color:var(--blue-dark);border-color:#bfdbfe}
.tag-purple{background:var(--purple-light);color:var(--purple);border-color:#ddd6fe}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px}
.nav-tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;letter-spacing:.02em}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{background:var(--surface2);padding:10px 14px;text-align:right;font-weight:700;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .12s}
th:hover{background:#e8ecf5;color:var(--text)}
th.admin-col{background:var(--purple-light);color:var(--purple)}
th.admin-col:hover{background:#ede9fe}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
td.admin-col{background:rgba(245,243,255,.3)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
tr:hover td.admin-col{background:var(--purple-light)}

.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-success{background:var(--green-light);color:#15803d;border:1px solid #bbf7d0}
.alert-error{background:var(--red-light);color:#b91c1c;border:1px solid #fecaca}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.55);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--radius);padding:30px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}

.field-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:start;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}

.icon-opt:hover,.icon-opt.selected{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}

/* SEARCH / PHONE */
.search-wrap{position:relative;margin-bottom:14px}

.phone-lookup{border-radius:var(--radius-sm);padding:13px 16px;margin-bottom:14px;font-size:13px}

.phone-lookup .pl-row:last-child{border:none}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--blue)}
.filter-label{font-size:12px;font-weight:600;color:var(--text2);align-self:center;white-space:nowrap}

.admin-input{padding:5px 9px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);width:100%;min-width:90px;transition:border-color .15s}

.section-divider{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 8px;border-top:1px solid var(--border);margin-top:18px;display:flex;align-items:center;gap:6px}

@keyframes spin{to{transform:rotate(360deg)}}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

<script>
const SB_URL  = 'https://vlhqkwwgmkriwojffced.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsaHFrd3dnbWtyaXdvamZmY2VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2MzY1ODEsImV4cCI6MjA5ODIxMjU4MX0.HDsgaf_S_CZjtqn2D75SpDk9KqjaC_kYtA2_Oex-vak';
const SB_REST = SB_URL+'/rest/v1';
const ICONS=['ti-file','ti-coin','ti-clock-off','ti-steps','ti-alert-circle','ti-phone','ti-tool','ti-refresh','ti-star','ti-flag','ti-user','ti-mail','ti-notes','ti-gift','ti-bolt','ti-heart','ti-award','ti-calendar','ti-chart-bar','ti-clipboard'];

// ── Org visual config ──
const ORG_STYLES = {
  'כללית אקטיב':    { bg:'linear-gradient(135deg,#1e3a8a,#1d4ed8)', logo:`<svg viewBox="0 0 48 48" width="36"><rect width="48" height="48" rx="10" fill="#1d4ed8"/><text x="24" y="32" text-anchor="middle" font-size="28" font-weight="900" fill="white" font-family="Arial">כ</text><text x="38" y="18" text-anchor="middle" font-size="16" fill="#22c55e" font-weight="900" font-family="Arial">+</text></svg>` },
  'כללית אקטיב+':   { bg:'linear-gradient(135deg,#1e3a8a,#1d4ed8)', logo:`<svg viewBox="0 0 48 48" width="36"><rect width="48" height="48" rx="10" fill="#1d4ed8"/><text x="24" y="32" text-anchor="middle" font-size="28" font-weight="900" fill="white" font-family="Arial">כ</text><text x="38" y="18" text-anchor="middle" font-size="16" fill="#22c55e" font-weight="900" font-family="Arial">+</text></svg>` },

  'לאומית FIT+':    { bg:'linear-gradient(135deg,#581c87,#7c3aed)', logo:`<svg viewBox="0 0 48 48" width="36"><rect width="48" height="48" rx="10" fill="#7c3aed"/><text x="24" y="30" text-anchor="middle" font-size="16" font-weight="900" fill="white" font-family="Arial Black,Arial">FIT</text><text x="38" y="14" text-anchor="middle" font-size="14" fill="#f472b6" font-weight="900" font-family="Arial">+</text></svg>` },

function orgStyle(name){
  // exact match first
  if(ORG_STYLES[name]) return ORG_STYLES[name];
  // fuzzy: find key that is contained in name or vice versa
  const key=Object.keys(ORG_STYLES).find(k=>name.includes(k)||k.includes(name));
  return key ? ORG_STYLES[key] : {bg:'linear-gradient(135deg,#374151,#4b5563)',logo:`<svg viewBox="0 0 48 48" width="36"><rect width="48" height="48" rx="10" fill="rgba(255,255,255,.15)"/><text x="24" y="32" text-anchor="middle" font-size="24" fill="white" font-family="Arial">🏢</text></svg>`};
}

let sbClient = window.supabase.createClient(SB_URL, SB_KEY);
let currentUser = null;
let allAgents = [];
let _selectedAgent = null;

async function api(method,table,body=null,params=''){
  const r=await fetch(`${SB_REST}/${table}${params}`,{method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:body?JSON.stringify(body):null});
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):null;
}
const GET=(t,p='')=>api('GET',t,null,p);
const POST=(t,b)=>api('POST',t,b);
const PATCH=(t,b,p)=>api('PATCH',t,b,p);
const DEL=(t,p)=>api('DELETE',t,null,p);

document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ══ LOGIN ══
function showLogin(screen){
  ['mode','agent','manager'].forEach(s=>document.getElementById('ls-'+s).style.display=s===screen?'block':'none');
  if(screen==='agent'){
    document.getElementById('agent-step1').style.display='block';
    document.getElementById('agent-step2').style.display='none';
    document.getElementById('agent-err').style.display='none';
    // תמיד מציג רק פעילים במסך כניסה
    populateAgents(allAgents.filter(u=>u.active!==false));
    setTimeout(()=>{ const el=document.getElementById('agent-search'); if(el){el.value='';el.focus();} },60);
  }
  if(screen==='manager') setTimeout(()=>document.getElementById('mgr-email').focus(),60);
}

function populateAgents(list){
  const el=document.getElementById('agent-list'); if(!el) return;
  // במסך כניסה — מציג רק פעילים

// ══ ALERT RULES ══
// alert_rule: { enabled, days, fieldId, condition: 'empty'|'not_value', value }
// A record triggers the alert if:
//   - it was created more than `days` days ago
//   - AND the specified field matches the condition

function businessDaysBetween(fromDate, toDate){
  // ימי עסקים: ראשון-חמישי בלבד (שישי=5, שבת=6 מוחרגים)
  let count=0;
  const cur=new Date(fromDate);
  cur.setHours(0,0,0,0);
  const end=new Date(toDate);
  end.setHours(0,0,0,0);
  while(cur<end){
    const day=cur.getDay();
    if(day!==5&&day!==6) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}

function recordMatchesAlert(record, file){
  const rule = file.alert_rule||{};
  if(!rule.enabled || !rule.fieldId) return false;

  // check days — ימי עסקים בלבד (ראשון-חמישי)
  if(rule.days){
    const age = businessDaysBetween(new Date(record.created_at), new Date());
    if(age < parseFloat(rule.days)) return false;
  }

  // get field value (extra or admin)
  const extraFields = file.extra_fields||[];
  const adminFields = file.admin_fields||[];
  const isAdmin = adminFields.find(f=>f.id===rule.fieldId);
  const val = isAdmin
    ? ((record.admin_data||{})[rule.fieldId]||'').toString()
    : ((record.extra||{})[rule.fieldId]||'').toString();

  if(rule.condition==='empty')     return !val || val.trim()==='';
  if(rule.condition==='not_value') return val !== (rule.value||'');
  if(rule.condition==='value')     return val === (rule.value||'');
  return false;
}

function isRecordPending(record,file){
  const rules=file.pending_rules||{};
  for(const af of(file.admin_fields||[])){
    const rule=rules[af.id]||'ignore'; if(rule==='ignore') continue;
    const val=(record.admin_data||{})[af.id];
    if(rule==='must_fill'&&(!val||val.toString().trim()==='')) return true;
    if(rule==='must_check'&&(!val||val===false||val==='false')) return true;
    if(rule.startsWith('value:')&&(val||'').toString()!==rule.slice(6)) return true;
  }
  return false;
}

// ── KEYBOARD SHORTCUTS for entry form ──
function wireFormShortcuts(){
  const form=document.getElementById('entry-form');
  if(!form) return;
  const fields=[...form.querySelectorAll('input,select,textarea')].filter(el=>el.type!=='checkbox'&&el.type!=='submit');
  fields.forEach((el,i)=>{
    el.addEventListener('keydown',(e)=>{
      // Ctrl+Enter or Cmd+Enter — submit form immediately
      if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){
        e.preventDefault();
        form.requestSubmit?form.requestSubmit():form.dispatchEvent(new Event('submit',{cancelable:true}));
        return;
      }
      // plain Enter on text/number/select — move to next field (not textarea, not last field which submits)
      if(e.key==='Enter'&&el.tagName!=='TEXTAREA'){
        e.preventDefault();
        const next=fields[i+1];
        if(next){ next.focus(); if(next.select) next.select(); }
        else { form.requestSubmit?form.requestSubmit():form.dispatchEvent(new Event('submit',{cancelable:true})); }
      }
    });
  });
  // focus first field automatically
  if(fields[0]) fields[0].focus();
}

function fieldIconGuess(label){
  const l=(label||'').toLowerCase();
  if(l.includes('טלפון')||l.includes('נייד')) return 'ti-phone';
  if(l.includes('מייל')||l.includes('אימייל')) return 'ti-mail';
  if(l.includes('כתובת')) return 'ti-map-pin';
  if(l.includes('הערה')||l.includes('הערות')) return 'ti-notes';
  if(l.includes('סטטוס')) return 'ti-flag';
  if(l.includes('תאריך')) return 'ti-calendar';
  if(l.includes('סכום')||l.includes('מחיר')||l.includes('עלות')) return 'ti-coin';
  if(l.includes('סיבה')) return 'ti-help-circle';
  if(l.includes('קוד')) return 'ti-barcode';
  if(l.includes('קישור')||l.includes('לינק')) return 'ti-link';
  if(l.includes('שם')) return 'ti-user';
  return 'ti-edit-circle';
}

function selectUnselectedFromFiltered(){
  // compute unselected at click time from current cached records
  const fileId = S.fileId;
  const records = _cachedRecords[fileId] || [];
  const q = (S.searchQ||'').toLowerCase();
  const f = DB.files.find(x=>x.id===fileId);
  const adminFields = f?.admin_fields||[];

  // apply same filters as render
  let filtered = q ? records.filter(r=>(r.first_name+' '+r.last_name+' '+r.phone+' '+r.id_num+' '+(r.agent_name||'')).toLowerCase().includes(q)) : records;
  Object.entries(S.filters||{}).forEach(([afId,val])=>{
    if(!val) return;
    const af=adminFields.find(x=>x.id===afId);
    const ef=extraFields.find(x=>x.id===afId);
    const field=af||ef; if(!field) return;
    filtered=filtered.filter(r=>{
      let v;
      if(af) v=((r.admin_data||{})[afId]||'').toString().toLowerCase();
      else    v=((r.extra||{})[afId]||'').toString().toLowerCase();
      if(field.type==='checkbox') return val==='yes'?(v==='true'):(v!=='true');
      if(field.type==='select') return val==='__empty__' ? !v : v===val;
      return v.toLowerCase().includes(val.toLowerCase());
    });

  let added = 0;
  filtered.forEach(r=>{
    if(!_selectedRows.has(r.id)){

async function bulkDelete(){

  await Promise.all(ids.map(id=>DEL('records',`?id=eq.${id}`)));
  if(_cachedRecords[fileId]) _cachedRecords[fileId]=_cachedRecords[fileId].filter(r=>!ids.includes(r.id));
  _allRecords=_allRecords.filter(r=>!ids.includes(r.id));
  await loadAllCounts();
  _selectedRows.clear();
  _bulkMode=false;
  render();
  showAlert(`נמחקו ${ids.length} רשומות`,'success');
}

async function bulkUpdateAll(fieldId, value, isAdminField){
  // operates on ALL currently filtered records — no selection needed
  const fileId=S.fileId;
  const f=DB.files.find(x=>x.id===fileId); if(!f) return;
  const records=_cachedRecords[fileId]||[];
  const extraFields=f.extra_fields||[], adminFields=f.admin_fields||[];

  // apply current filters to get filtered list
  const q=(S.searchQ||'').toLowerCase();
  let filtered=q?records.filter(r=>(r.first_name+' '+r.last_name+' '+r.phone+' '+r.id_num+' '+(r.agent_name||'')).toLowerCase().includes(q)):records;
  Object.entries(S.filters||{}).forEach(([afId,val])=>{
    if(!val) return;
    const af=adminFields.find(x=>x.id===afId), ef=extraFields.find(x=>x.id===afId);
    const field=af||ef; if(!field) return;
    filtered=filtered.filter(r=>{
      const v=af?((r.admin_data||{})[afId]||'').toString():((r.extra||{})[afId]||'').toString();
      if(field.type==='checkbox') return val==='yes'?(v==='true'):(v!=='true');
      if(field.type==='select') return val==='__empty__' ? !v : v===val; // exact match for select
      return v.toLowerCase().includes(val.toLowerCase()); // partial for text
    });
  });

  if(!filtered.length){showAlert('אין רשומות מסוננות','error');return;}
  const field=isAdminField?adminFields.find(x=>x.id===fieldId):extraFields.find(x=>x.id===fieldId);
  const label=field?field.label:fieldId;
  const displayVal=typeof value==='boolean'?(value?'כן':'לא'):value;
  if(!confirm(`לעדכן "${label}" = "${displayVal}" על כל ${filtered.length} הרשומות המסוננות?`)) return;

  await Promise.all(filtered.map(async r=>{
    if(isAdminField){
      if(!r.admin_data) r.admin_data={};
      r.admin_data[fieldId]=value;
      await PATCH('records',{admin_data:r.admin_data},`?id=eq.${r.id}`);
    } else {
      if(!r.extra) r.extra={};
      r.extra[fieldId]=typeof value==='boolean'?(value?'כן':'לא'):value;
      await PATCH('records',{extra:r.extra},`?id=eq.${r.id}`);
    }
  }));
  await loadAllCounts();
  render();
  showAlert(`✓ עודכנו ${filtered.length} רשומות`,'success');
}

async function bulkSetField(fieldId, value){
  if(_selectedRows.size===0){ showAlert('לא נבחרו רשומות','error'); return; }
  const fileId=S.fileId;
  const f=DB.files.find(x=>x.id===fileId);
  const af=(f?.admin_fields||[]).find(x=>x.id===fieldId);
  if(!af) return;
  const label=af.label;
  const displayVal=typeof value==='boolean'?(value?'✓ מסומן':'✗ מבוטל'):value;
  if(!confirm(`לסמן "${label}" = "${displayVal}" על ${_selectedRows.size} רשומות?`)) return;

  const ids=[..._selectedRows];
  let done=0;
  // show progress
  showAlert(`מעדכן 0 / ${ids.length}...`,'success');

  await Promise.all(ids.map(async id=>{
    const recs=_cachedRecords[fileId]||[];
    const record=recs.find(r=>r.id===id);
    if(!record) return;
    if(!record.admin_data) record.admin_data={};
    record.admin_data[fieldId]=value;
    await PATCH('records',{admin_data:record.admin_data},`?id=eq.${id}`);
    done++;
  }));

  await loadAllCounts();
  _selectedRows.clear();
  _bulkMode=false;
  render();
  showAlert(`✓ עודכנו ${done} רשומות בהצלחה`,'success');
}

      let v;
      if(af) v=((r.admin_data||{})[afId]||'').toString().toLowerCase();
      else    v=((r.extra||{})[afId]||'').toString().toLowerCase();
      if(field.type==='checkbox') return val==='yes'?(v==='true'):(v!=='true');
      if(field.type==='select') return val==='__empty__' ? !v : v===val;
      return v.toLowerCase().includes(val.toLowerCase());
    });
  });
  const sortable=(col,label,cls='')=>{
    const active=S.sortCol===col;
    const arrow=active?(S.sortDir===1?'↑':'↓'):'';
    return `<th class="${cls}" onclick="toggleSort('${col}')">${label}${arrow?` <span style="color:var(--blue)">${arrow}</span>`:' <span style="opacity:.3;font-size:10px">⇅</span>'}</th>`;
  };
  if(S.sortCol){
    const col=S.sortCol;
    filtered=[...filtered].sort((a,b)=>{
      let va='',vb='';
      if(col==='date'){va=a.created_at;vb=b.created_at;}
      else if(col==='first_name'){va=a.first_name;vb=b.first_name;}
      else if(col==='last_name'){va=a.last_name;vb=b.last_name;}
      else if(col==='phone'){va=a.phone;vb=b.phone;}
      else if(col==='id_num'){va=a.id_num;vb=b.id_num;}
      else if(col==='agent'){va=a.agent_name||'';vb=b.agent_name||'';}
      else if(col==='treated_at'){va=a.treated_at||'';vb=b.treated_at||'';}
      else if(col.startsWith('extra_')){const id=col.slice(6);va=(a.extra||{})[id]||'';vb=(b.extra||{})[id]||'';}
      else if(col.startsWith('admin_')){const id=col.slice(6);va=((a.admin_data||{})[id]||'').toString();vb=((b.admin_data||{})[id]||'').toString();}
      if(va<vb) return -S.sortDir; if(va>vb) return S.sortDir; return 0;
    });
  }

  const filteredIds=filtered.map(r=>r.id);
  const allSelectedInFiltered=filteredIds.length>0&&filteredIds.every(id=>_selectedRows.has(id));

  const bulkCheckH=isAdmin&&_bulkMode?`<th style="width:36px;text-align:center">
    <input type="checkbox" title="בחר הכל" ${allSelectedInFiltered?'checked':''} style="accent-color:var(--blue);width:15px;height:15px;cursor:pointer" onchange="${allSelectedInFiltered?'deselectAll()':'selectAllFiltered()'}">
  </th>`:'';
  const extraH=extraFields.map(ef=>sortable('extra_'+ef.id,esc(ef.label))).join('');
  const adminH=adminFields.map(af=>sortable('admin_'+af.id,'<i class="ti ti-shield-check" style="font-size:10px"></i> '+esc(af.label),'admin-col')).join('');
  const treatedH=(isAdmin&&adminFields.length)?sortable('treated_at','<i class="ti ti-clock-check" style="font-size:10px"></i> תאריך טיפול','admin-col'):'';
  const noteH=isAdmin?'<th class="admin-col" style="white-space:nowrap"><i class="ti ti-message-2" style="font-size:10px"></i> הערת מנהל</th>':'';
  const approveH='';
  const histH=isAdmin?'<th></th>':'';
  const delH=isAdmin?'<th></th>':'';

  const rows=filtered.map(r=>{
    const isSelected=_selectedRows.has(r.id);
    const bulkCb=isAdmin&&_bulkMode?`<td style="text-align:center;background:${isSelected?'var(--blue-light)':''}">
      <input type="checkbox" id="row-cb-${r.id}" ${isSelected?'checked':''} style="accent-color:var(--blue);width:15px;height:15px;cursor:pointer" onchange="toggleRowSelect('${r.id}')">
    </td>`:'';
    const rowStyle=isSelected?'background:var(--blue-light)':'';
    const extraC=extraFields.map(ef=>{
      const v=(r.extra||{})[ef.id]||'';
      if(ef.type==='select'&&v){const cls=v==='טופל'?'badge-success':v==='לא טופל'?'badge-warning':'badge-info';return `<td><span class="badge ${cls}">${esc(v)}</span></td>`;}
      if(ef.type==='link'&&v){
        const url=v.match(/^https?:\/\//)?v:('https://'+v);
        return `<td><a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline;display:flex;align-items:center;gap:4px" onclick="event.stopPropagation()"><i class="ti ti-link" style="font-size:12px"></i> פתח</a></td>`;
      }
      return `<td>${esc(v)}</td>`;
    }).join('');
    const adminC=adminFields.map(af=>{
      const val=(r.admin_data||{})[af.id];
      if(!isAdmin){
        const agentChatBadge=af.chatEnabled?`<span onclick="event.stopPropagation();showFieldChatFromRecord(event,'${af.id}','${esc(af.label)}',_cachedRecords['${S.fileId}']?.find(x=>x.id==='${r.id}')||{id:'${r.id}',field_comments:{}})" style="cursor:pointer;color:var(--blue);margin-right:4px;flex-shrink:0" title="פתח שיחה עם מנהל"><i class="ti ti-message-circle" style="font-size:14px"></i>${((r.field_comments||{})[af.id]||[]).length>0?`<sup style="font-size:9px;font-weight:800">${((r.field_comments||{})[af.id]||[]).length}</sup>`:''}</span>`:'';
        // if agentEditable — show editable input for agent
        if(af.agentEditable){
          if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:4px">${agentChatBadge}<input type="checkbox" class="admin-checkbox" ${val?'checked':''} onchange="saveAdminField('${r.id}','${af.id}',this.checked,'${S.fileId}')"></div></td>`;
          if(af.type==='select'){const opts=(af.options||'').split(',').map(o=>`<option value="${esc(o.trim())}" ${val===o.trim()?'selected':''}>${esc(o.trim())}</option>`).join('');return `<td class="admin-col"><div style="display:flex;align-items:center;gap:2px">${agentChatBadge}<select class="admin-input" style="flex:1;border-color:#ea580c" onchange="saveAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"><option value="">--</option>${opts}</select></div></td>`;}
          return `<td class="admin-col"><div style="display:flex;align-items:center;gap:2px">${agentChatBadge}<input class="admin-input" type="text" value="${esc(val||'')}" placeholder="הזן..." style="flex:1;border-color:#ea580c" oninput="debounceAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"></div></td>`;
        }
        if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:4px">${agentChatBadge}${val?'<i class="ti ti-check" style="color:var(--green)"></i>':'<i class="ti ti-x" style="color:var(--text3)"></i>'}</div></td>`;
        if(af.type==='select'){const cls=val==='כן'||val==='מאושר'?'badge-success':val==='לא'||val==='דחוי'?'badge-warning':'badge-info';return `<td class="admin-col"><div style="display:flex;align-items:center;gap:4px">${agentChatBadge}${val?`<span class="badge ${cls}">${esc(val)}</span>`:''}</div></td>`;}
        if(af.type==='link'&&val){const url=val.match(/^https?:\/\//)?val:('https://'+val);return `<td class="admin-col"><div style="display:flex;align-items:center;gap:4px">${agentChatBadge}<a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline;display:flex;align-items:center;gap:4px" onclick="event.stopPropagation()"><i class="ti ti-link" style="font-size:12px"></i> פתח</a></div></td>`;}
        return `<td class="admin-col"><div style="display:flex;align-items:center;gap:4px">${agentChatBadge}${esc(val||'')}</div></td>`;
      }
      if(_bulkMode){
        // in bulk mode show read-only admin fields
        if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center">${val?'<i class="ti ti-check" style="color:var(--green)"></i>':'<i class="ti ti-x" style="color:var(--text3);opacity:.4"></i>'}</td>`;
        if(af.type==='select'){const cls=val==='כן'||val==='מאושר'?'badge-success':val==='לא'||val==='דחוי'?'badge-warning':'badge-info';return `<td class="admin-col">${val?`<span class="badge ${cls}">${esc(val)}</span>`:''}</td>`;}
        if(af.type==='link'&&val){const url=val.match(/^https?:\/\//)?val:('https://'+val);return `<td class="admin-col"><a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:underline" onclick="event.stopPropagation()"><i class="ti ti-link" style="font-size:12px"></i> פתח</a></td>`;}
        return `<td class="admin-col" style="color:var(--text3)">${esc(val||'—')}</td>`;
      }
      // chat trigger — wrap cell with click handler if chatEnabled
      const chatBadge=af.chatEnabled?`<span onclick="event.stopPropagation();showFieldChatFromRecord(event,'${af.id}','${esc(af.label)}',_cachedRecords['${S.fileId}']?.find(x=>x.id==='${r.id}')||{id:'${r.id}',field_comments:{}})" style="cursor:pointer;color:var(--blue);margin-right:4px;flex-shrink:0" title="פתח שיחה"><i class="ti ti-message-circle" style="font-size:14px"></i>${((r.field_comments||{})[af.id]||[]).length>0?`<sup style="font-size:9px;font-weight:800">${((r.field_comments||{})[af.id]||[]).length}</sup>`:''}</span>`:'';
      if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;gap:4px">${chatBadge}<input type="checkbox" class="admin-checkbox" ${val?'checked':''} onchange="saveAdminField('${r.id}','${af.id}',this.checked,'${S.fileId}')"></div></td>`;
      if(af.type==='select'){const opts=(af.options||'').split(',').map(o=>`<option value="${esc(o.trim())}" ${val===o.trim()?'selected':''}>${esc(o.trim())}</option>`).join('');return `<td class="admin-col"><div style="display:flex;align-items:center;gap:2px">${chatBadge}<select class="admin-input" style="flex:1" onchange="saveAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"><option value="">--</option>${opts}</select></div></td>`;}
      if(af.type==='link') return `<td class="admin-col"><div style="display:flex;gap:4px;align-items:center">${chatBadge}<input class="admin-input" type="text" value="${esc(val||'')}" placeholder="https://..." dir="ltr" style="font-size:11px;flex:1" oninput="debounceAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')">
        ${val?`<a href="${(val.match(/^https?:\/\//)?val:'https://'+val).replace(/"/g,'&quot;')}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:var(--blue);flex-shrink:0" title="פתח קישור"><i class="ti ti-external-link"></i></a>`:''}
      </div></td>`;
      return `<td class="admin-col"><div style="display:flex;align-items:center;gap:2px">${chatBadge}<input class="admin-input" type="text" value="${esc(val||'')}" placeholder="הזן..." style="flex:1" oninput="debounceAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"></div></td>`;
    }).join('');
    const agentC=`<td><span class="badge badge-neutral">${esc(r.agent_name||'—')}</span></td>`;
    const lastChange=(r.change_log||[]).slice(-1)[0];
    const treatedBy=lastChange?.by||'';
    const treatedC=(isAdmin&&adminFields.length)?`<td class="admin-col" id="treated-at-${r.id}" style="font-size:11px;color:var(--text3);white-space:nowrap">
      ${r.treated_at?`<div>${fmtDate(r.treated_at)}</div><div style="color:var(--purple);font-weight:600;font-size:10px">${esc(treatedBy)}</div>`:'—'}
    </td>`:'';

    const noteC=isAdmin&&!_bulkMode?`<td class="admin-col" style="max-width:180px">
      <div style="display:flex;align-items:center;gap:5px">
        <textarea class="admin-input" rows="1"
          placeholder="הוסף הערה..."
          style="min-width:120px;resize:none;overflow:hidden;font-size:11px;line-height:1.4"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';debounceManagerNote('${r.id}',this.value,'${S.fileId}')"
          title="הערת מנהל">${esc(r.manager_note||'')}</textarea>
        ${r.manager_note?`<i class="ti ti-message-2-check" style="color:var(--purple);font-size:14px;flex-shrink:0" title="יש הערה"></i>`:''}
      </div>
    </td>`:''+(isAdmin?'<td class="admin-col"></td>':'');
    // archive mode: show restore button in del column area
    const approveC=isAdmin&&S.archiveMode
      ?`<td style="text-align:center"><div style="display:flex;flex-direction:column;gap:3px;align-items:center">
          <span style="font-size:10px;color:var(--text3)">${r.archived_at?fmtDate(r.archived_at):''}</span>
          <button class="btn btn-xs" onclick="restoreFromArchive('${r.id}','${S.fileId}')"><i class="ti ti-archive-off"></i> שחזר</button>
        </div></td>`
      :'';
    const histC=(isAdmin&&!_bulkMode&&(r.change_log||[]).length)?`<td><button class="btn btn-xs" onclick='showChangeLog(${JSON.stringify(r.change_log).replace(/'/g,"&#39;")},"${esc(r.first_name)} ${esc(r.last_name)}")' title="היסטוריית שינויים"><i class="ti ti-history"></i></button></td>`:(isAdmin&&!_bulkMode?'<td></td>':'');
    const delC=isAdmin&&!_bulkMode?`<td><button class="btn btn-xs btn-danger" onclick="confirmDelRecord('${r.id}','${S.fileId}')"><i class="ti ti-trash"></i></button></td>`:(isAdmin?'<td></td>':'');
    const trStyle=`${isSelected?'background:var(--blue-light);':rowStyle}${_bulkMode?';cursor:pointer':''}`;
    return `<tr style="${trStyle}" onclick="${_bulkMode?`event.stopPropagation();toggleRowSelect('${r.id}')`:''}">${bulkCb}<td style="font-size:12px;white-space:nowrap;color:var(--text3)">${fmtDate(r.created_at)}</td><td><strong>${esc(r.first_name)}</strong></td><td>${esc(r.last_name)}</td><td dir="ltr">${esc(r.phone)}</td><td dir="ltr">${esc(r.id_num)}</td>${extraC}${agentC}${adminC}${treatedC}${noteC}${histC}${delC}</tr>`;
  }).join('');

  // ALL fields available for filtering (extra + admin)
  const allFilterableFields = [
    ...extraFields.map(ef=>({...ef,_isAdmin:false})),
    ...adminFields.map(af=>({...af,_isAdmin:true}))
  ];

  const filterBar=allFilterableFields.length?`<div class="filter-bar">
    <span class="filter-label"><i class="ti ti-filter"></i> סינון:</span>
    ${allFilterableFields.map(field=>{
      const fid=field.id;
      const cur=esc(S.filters[fid]||'');
      const badge=field._isAdmin?'<i class="ti ti-shield-check" style="font-size:10px;color:var(--purple)"></i>':'';
      if(field.type==='checkbox') return `<select onchange="setFilter('${fid}',this.value)" style="${field._isAdmin?'border-color:var(--purple)':''}"><option value="">כל ${badge}${esc(field.label)}</option><option value="yes" ${cur==='yes'?'selected':''}>✓ מסומן</option><option value="no" ${cur==='no'?'selected':''}>✗ לא מסומן</option></select>`;
      if(field.type==='select') return `<select onchange="setFilter('${fid}',this.value)" style="${field._isAdmin?'border-color:var(--purple)':''}"><option value="">כל ${badge}${esc(field.label)}</option><option value="__empty__" ${cur==='__empty__'?'selected':''}>— ריק / טרם נבחר —</option>${(field.options||'').split(',').map(o=>`<option value="${esc(o.trim())}" ${cur===esc(o.trim())?'selected':''}>${esc(o.trim())}</option>`).join('')}</select>`;
      return `<input type="text" placeholder="סנן ${esc(field.label)}..." value="${cur}" id="filter-txt-${fid}" oninput="debounceFilter('${fid}',this.value)" style="min-width:120px${field._isAdmin?';border-color:var(--purple)':''}">`;
    }).join('')}
    <button class="btn btn-xs" onclick="S.filters={};render()"><i class="ti ti-x"></i> נקה</button>
  </div>`:'';

  // BULK UPDATE ALL FILTERED — no selection needed
  const bulkEligibleFields = [...extraFields,...adminFields].filter(field=>field.bulkEnabled!==false);
  const bulkAllBar = isAdmin && filtered.length>0 && bulkEligibleFields.length ? `
    <div style="background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #86efac;border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:#15803d;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <i class="ti ti-bolt"></i> עדכון גורף — החל על כל ${filtered.length} הרשומות המסוננות
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${bulkEligibleFields.map(field=>{
          const isAdm=adminFields.includes(field);
          const color=isAdm?'var(--purple)':'var(--blue)';
          const icon=isAdm?'ti-shield-check':'ti-forms';
          let ctrl='';
          if(field.type==='checkbox'){
            ctrl=`<button class="btn btn-xs btn-success" onclick="bulkUpdateAll('${field.id}',true,${isAdm})"><i class="ti ti-check"></i> סמן</button>
                  <button class="btn btn-xs" style="border-color:var(--border2)" onclick="bulkUpdateAll('${field.id}',false,${isAdm})"><i class="ti ti-x"></i> בטל</button>`;
          } else if(field.type==='select'){
            const opts=(field.options||'').split(',').map(o=>`<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('');
            ctrl=`<select class="admin-input" style="font-size:12px" onchange="if(this.value){bulkUpdateAll('${field.id}',this.value,${isAdm});this.value=''}">
              <option value="">בחר ערך...</option>${opts}</select>`;
          } else {
            ctrl=`<input type="text" class="admin-input" id="bua-${field.id}" style="font-size:12px;min-width:90px" placeholder="הזן...">
                  <button class="btn btn-xs btn-primary" onclick="const v=document.getElementById('bua-${field.id}').value.trim();if(v)bulkUpdateAll('${field.id}',v,${isAdm})"><i class="ti ti-check"></i></button>`;
          }
          return `<div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.08);border-radius:var(--radius-xs);padding:5px 9px">
            <span style="font-size:11px;font-weight:700;color:${color};white-space:nowrap;display:flex;align-items:center;gap:3px">
              <i class="ti ${icon}" style="font-size:11px"></i>${esc(field.label)}:
            </span>
            ${ctrl}
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  // bulk action bar
  const bulkBar=isAdmin&&_bulkMode&&_selectedRows.size>0?`
    <div id="bulk-bar" style="background:var(--blue-light);border:1.5px solid var(--blue);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      ${bulkBarHTML(_selectedRows.size)}
    </div>`:'';

  // "select all filtered" shortcut — only show unselected remainder
  const unselectedInFiltered = filteredIds.filter(id=>!_selectedRows.has(id));
  const unselectedCount = unselectedInFiltered.length;
  const selectAllBtn=isAdmin&&_bulkMode&&unselectedCount>0?`
    <button class="btn btn-sm btn-primary" style="margin-bottom:10px" onclick="selectUnselectedFromFiltered()">
      <i class="ti ti-checks"></i> בחר את ${unselectedCount} הרשומות שטרם נבחרו
    </button>`:'';

  return `<div class="card">
    <!-- Archive / Active tabs -->
    <div style="display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:16px">
      <button class="nav-tab ${!S.archiveMode?'active':''}" onclick="goRecords('${S.fileId}',false)" style="display:flex;align-items:center;gap:6px">
        <i class="ti ti-list"></i> פעילות
        ${pendingArchiveCount>0?`<span style="background:#f97316;color:#fff;border-radius:20px;padding:0 7px;font-size:11px;font-weight:800">${pendingArchiveCount} ממתינות</span>`:''}
      </button>
      <button class="nav-tab ${S.archiveMode?'active':''}" onclick="goRecords('${S.fileId}',true)" style="display:flex;align-items:center;gap:6px">
        <i class="ti ti-archive"></i> ארכיון
        ${archiveCount>0?`<span style="background:var(--text3);color:#fff;border-radius:20px;padding:0 7px;font-size:11px">${archiveCount}</span>`:''}
      </button>
    </div>
    <div class="flex-between" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:0;border:none;padding:0"><i class="ti ${f.icon||'ti-file'}"></i>${esc(f.name)} — ${S.archiveMode?'ארכיון':'רשומות פעילות'}</div>
      <div class="flex-gap">
        ${isAdmin?`<button class="btn btn-sm ${_bulkMode?'btn-primary':''}" onclick="toggleBulkMode()" title="עריכה מרובה">
          <i class="ti ti-${_bulkMode?'x':'checkbox'}"></i> ${_bulkMode?'בטל בחירה':'בחירה מרובה'}
        </button>`:''}
        ${isAdmin&&bulkEligibleFields.length?`<button class="btn btn-sm ${S.showBulkAll?'btn-success':''}" onclick="toggleBulkAllBar()" title="עדכון גורף לפי סינון">
          <i class="ti ti-${S.showBulkAll?'x':'bolt'}"></i> ${S.showBulkAll?'סגור עדכון גורף':'עדכון גורף'}
        </button>`:''}
        <button class="btn btn-sm" onclick="goForm('${f.id}')"><i class="ti ti-edit"></i> הזנה חדשה</button>
        <button class="btn btn-sm btn-success" onclick="exportFile('${f.id}')"><i class="ti ti-download"></i> ייצוא Excel</button>
      </div>
    </div>
    ${adminFields.length?`<div style="margin-bottom:12px"><span class="badge badge-purple"><i class="ti ti-shield-check"></i> שדות ניהוליים: ${adminFields.map(af=>esc(af.label)).join(', ')}</span></div>`:''}
    <div class="search-wrap">
      <input class="form-input" id="records-search" type="text" placeholder='חיפוש לפי שם / טלפון / ת"ז / נציג...' value="${esc(S.searchQ)}" oninput="debounceSearch(this.value)">
      <i class="ti ti-search"></i>
    </div>
    ${filterBar}
    ${S.showBulkAll?bulkAllBar:''}
    ${bulkBar}
    ${selectAllBtn}
    <input type="hidden" id="filtered-ids" value='${JSON.stringify(filteredIds)}'>
    ${!filtered.length
      ?`<div class="empty"><i class="ti ti-database-off"></i><p>${q?'לא נמצאו תוצאות':'אין רשומות עדיין'}</p></div>`

// ══ FIELD CHAT SYSTEM ══
let _chatPopup=null;
let _chatFieldId=null;
let _chatRecordId=null;
let _chatHideTimer=null;

function showFieldChat(event, fieldId, fieldLabel){
  clearTimeout(_chatHideTimer);
  // need current record — get from URL/form or from cache
  // We need recordId — find from phone lookup or current record in view
  const record = _chatCurrentRecord;
  if(!record) return; // no record selected yet

  _chatFieldId=fieldId;
  _chatRecordId=record.id;

  // remove existing popup
  if(_chatPopup) _chatPopup.remove();

  const comments=(record.field_comments||{})[fieldId]||[];
  const messagesHTML=comments.length
    ? comments.map(m=>`
        <div class="chat-msg ${m.role}">
          <div>${esc(m.text)}</div>
          <div class="chat-msg-meta">${esc(m.name)} · ${fmtDate(m.ts)}</div>
        </div>`).join('')
    : `<div style="text-align:center;color:var(--text3);font-size:12px;padding:16px">אין הערות עדיין</div>`;

  const popup=document.createElement('div');
  popup.className='chat-popup';
  popup.id='field-chat-popup';
  popup.innerHTML=`
    <div class="chat-popup-header">
      <div class="chat-popup-title"><i class="ti ti-message-2"></i> ${esc(fieldLabel)}</div>
      <button class="chat-popup-close" onclick="hideFieldChat()">✕</button>
    </div>
    <div class="chat-messages" id="chat-messages-list">${messagesHTML}</div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="כתוב הערה..." onkeydown="if(event.key==='Enter')sendChatMsg()">
      <button class="chat-send-btn" onclick="sendChatMsg()" title="שלח"><i class="ti ti-send"></i></button>
    </div>`;

  // position near cursor
  const rect=event.currentTarget.getBoundingClientRect();
  popup.style.top=(rect.bottom+window.scrollY+8)+'px';
  popup.style.left=Math.max(10,Math.min(rect.left+window.scrollX, window.innerWidth-340))+'px';

  document.body.appendChild(popup);
  _chatPopup=popup;

  // scroll to bottom
  setTimeout(()=>{
    const list=document.getElementById('chat-messages-list');
    if(list) list.scrollTop=list.scrollHeight;
    document.getElementById('chat-input')?.focus();
  },50);

  // keep popup alive when mouse enters it
  popup.addEventListener('mouseenter',()=>clearTimeout(_chatHideTimer));
  popup.addEventListener('mouseleave',()=>scheduleHideChat());
}

function scheduleHideChat(){
  _chatHideTimer=setTimeout(hideFieldChat,400);
}
function hideFieldChat(){
  if(_chatPopup){_chatPopup.remove();_chatPopup=null;}
  _chatFieldId=null; _chatRecordId=null;
}

async function sendChatMsg(){
  const input=document.getElementById('chat-input');
  const text=(input?.value||'').trim();
  if(!text||!_chatRecordId||!_chatFieldId) return;
  input.value='';
  input.disabled=true;

  const fileId=S.fileId;
  const recs=_cachedRecords[fileId]||[];
  const record=recs.find(r=>r.id===_chatRecordId);
  if(!record) return;

  if(!record.field_comments) record.field_comments={};
  if(!record.field_comments[_chatFieldId]) record.field_comments[_chatFieldId]=[];

  const msg={
    role: S.adminLoggedIn?'manager':'agent',
    name: currentUser?.name||_agentName||'—',
    text,
    ts: new Date().toISOString()
  };
  record.field_comments[_chatFieldId].push(msg);

  try{
    await PATCH('records',{field_comments:record.field_comments},`?id=eq.${_chatRecordId}`);
    // update popup messages
    const list=document.getElementById('chat-messages-list');
    if(list){
      const msgEl=document.createElement('div');
      msgEl.className=`chat-msg ${msg.role}`;
      msgEl.innerHTML=`<div>${esc(msg.text)}</div><div class="chat-msg-meta">${esc(msg.name)} · ${fmtDate(msg.ts)}</div>`;
      list.appendChild(msgEl);
      list.scrollTop=list.scrollHeight;
    }
  }catch(e){ showAlert('שגיאה בשמירת הערה','error'); }
  input.disabled=false;
  input.focus();
}

// track current record for chat (set when form loads with phone lookup)
let _chatCurrentRecord=null;


function openRecordChat(event, recordId, fileId){
  event.stopPropagation();
  const recs=_cachedRecords[fileId]||[];
  const record=recs.find(r=>r.id===recordId); if(!record) return;
  _chatCurrentRecord=record;
  const f=DB.files.find(x=>x.id===fileId);
  const chatFields=[...(f?.extra_fields||[]),...(f?.admin_fields||[])].filter(ef=>ef.chatEnabled);
  if(!chatFields.length) return;
  if(chatFields.length===1){
    showFieldChatFromRecord(event, chatFields[0].id, chatFields[0].label, record);
  } else {
    if(_chatPopup) _chatPopup.remove();
    const popup=document.createElement('div');
    popup.className='chat-popup'; popup.style.width='220px';
    popup.innerHTML=`<div class="chat-popup-header"><div class="chat-popup-title"><i class="ti ti-message-2"></i> בחר שדה</div><button class="chat-popup-close" onclick="hideFieldChat()">✕</button></div>
      <div style="padding:8px">${chatFields.map(ef=>{
        const count=((record.field_comments||{})[ef.id]||[]).length;
        return `<button onclick="showFieldChatFromRecord(null,'${ef.id}','${esc(ef.label)}',_chatCurrentRecord)" style="width:100%;text-align:right;padding:8px 10px;margin-bottom:4px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;font-family:inherit;font-size:13px;display:flex;align-items:center;justify-content:space-between"><span>${esc(ef.label)}</span>${count>0?`<span style="background:var(--blue);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">${count}</span>`:''}</button>`;
      }).join('')}</div>`;
    const rect=event.target.getBoundingClientRect();
    popup.style.top=(rect.bottom+window.scrollY+6)+'px';
    popup.style.left=Math.max(10,rect.left+window.scrollX-100)+'px';
    document.body.appendChild(popup); _chatPopup=popup;
  }
}
function showFieldChatFromRecord(event, fieldId, fieldLabel, record){
  _chatFieldId=fieldId; _chatRecordId=record.id; _chatCurrentRecord=record;
  if(_chatPopup) _chatPopup.remove();
  const comments=(record.field_comments||{})[fieldId]||[];
  const messagesHTML=comments.length
    ?comments.map(m=>`<div class="chat-msg ${m.role}"><div>${esc(m.text)}</div><div class="chat-msg-meta">${esc(m.name)} · ${fmtDate(m.ts)}</div></div>`).join('')
    :`<div style="text-align:center;color:var(--text3);font-size:12px;padding:16px">אין הערות עדיין</div>`;
  const popup=document.createElement('div');
  popup.className='chat-popup'; popup.id='field-chat-popup';
  popup.innerHTML=`<div class="chat-popup-header"><div class="chat-popup-title"><i class="ti ti-message-2"></i> ${esc(fieldLabel)}</div><button class="chat-popup-close" onclick="hideFieldChat()">✕</button></div>
    <div class="chat-messages" id="chat-messages-list">${messagesHTML}</div>
    <div class="chat-input-row"><input type="text" id="chat-input" placeholder="כתוב הערה..." onkeydown="if(event.key==='Enter')sendChatMsg()"><button class="chat-send-btn" onclick="sendChatMsg()"><i class="ti ti-send"></i></button></div>`;
  if(event){const rect=event.target?.getBoundingClientRect()||{bottom:200,left:200};popup.style.top=(rect.bottom+window.scrollY+6)+'px';popup.style.left=Math.max(10,Math.min(rect.left+window.scrollX-100,window.innerWidth-340))+'px';}
  else{popup.style.top='200px';popup.style.left='50%';popup.style.transform='translateX(-50%)';}
  document.body.appendChild(popup); _chatPopup=popup;
  popup.addEventListener('mouseenter',()=>clearTimeout(_chatHideTimer));
  popup.addEventListener('mouseleave',()=>scheduleHideChat());
  setTimeout(()=>{const list=document.getElementById('chat-messages-list');if(list)list.scrollTop=list.scrollHeight;document.getElementById('chat-input')?.focus();},50);
}
document.addEventListener('keydown',(e)=>{if(e.key==='Escape')hideFieldChat();});

function debounceGlobalSearch(val){
  S.globalSearch=val;

}

async function runGlobalSearch(q){
  if(!q.trim()) return;
  const term=q.trim();
  const orParams=`?or=(phone.ilike.*${encodeURIComponent(term)}*,first_name.ilike.*${encodeURIComponent(term)}*,last_name.ilike.*${encodeURIComponent(term)}*,id_num.ilike.*${encodeURIComponent(term)}*)&limit=40&select=id,file_id,first_name,last_name,phone,id_num,created_at,agent_name,archived,approved_at`;
  try{
    const results = await GET('records', orParams);
    S.globalSearchResults = results||[];
  }catch(e){ S.globalSearchResults=[]; }
  const pos = document.getElementById('global-search-input')?.selectionStart;
  render();
  const el=document.getElementById('global-search-input');
  if(el){el.focus();if(pos)el.setSelectionRange(pos,pos);}
}

  { key:'month',   label:'חודש נוכחי' },
  { key:'3months', label:'3 חודשים' },
  { key:'6months', label:'חצי שנה' },
  { key:'year',    label:'שנה' },
  { key:'all',     label:'הכל' },
];

function dashPeriodRange(key){
  const now = new Date();
  let from = null;
  if(key==='today'){
    from = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  } else if(key==='yesterday'){
    const y = new Date(now.getFullYear(),now.getMonth(),now.getDate()-1);
    return { from: y.toISOString(), to: new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString() };
  } else if(key==='week'){
    const day = now.getDay(); // 0=Sun
    from = new Date(now.getFullYear(),now.getMonth(),now.getDate()-day);
  } else if(key==='month'){
    from = new Date(now.getFullYear(),now.getMonth(),1);
  } else if(key==='3months'){
    from = new Date(now.getFullYear(),now.getMonth()-3,now.getDate());
  } else if(key==='6months'){
    from = new Date(now.getFullYear(),now.getMonth()-6,now.getDate());
  } else if(key==='year'){
    from = new Date(now.getFullYear()-1,now.getMonth(),now.getDate());
  }
  return { from: from?from.toISOString():null, to: null };
}

async function loadDashDataForPeriod(){
  const {from, to} = dashPeriodRange(_dashPeriod);
  await Promise.all(DB.files.filter(f=>canManagerAccessFile(f)).map(async f=>{
    try{
      let params=`?file_id=eq.${f.id}&select=id,created_at,extra,admin_data`;
      if(from) params+=`&created_at=gte.${encodeURIComponent(from)}`;
      if(to)   params+=`&created_at=lt.${encodeURIComponent(to)}`;
      const recs = await GET('records', params);
      const total = recs.length;
      const breached = recs.filter(r=>recordMatchesAlert(r,f)).length;
      // store on data item
      if(!S._dashboardData) S._dashboardData=[];
      const existing = S._dashboardData.find(d=>d.file.id===f.id);
      if(existing){ existing.total=total; existing.breached=breached; }
      else S._dashboardData.push({file:f, total, breached});
    }catch(e){}
  }));
  // ensure all files present
  DB.files.forEach(f=>{
    if(!S._dashboardData) S._dashboardData=[];
    if(!S._dashboardData.find(d=>d.file.id===f.id)) S._dashboardData.push({file:f,total:0,breached:0});
  });
}

let _trendData = [];
async function loadTrendData(){
  if(!_trendsFileId) return;
  S._trendsLoading=true; render();
  try{
    const since = new Date(Date.now() - _trendsRange*86400000).toISOString();
    const recs = await GET('records',`?file_id=eq.${_trendsFileId}&created_at=gte.${since}&select=created_at`);
    // bucket by day
    const buckets = {};
    for(let i=_trendsRange-1;i>=0;i--){
      const d = new Date(Date.now() - i*86400000);
      const key = d.toISOString().slice(0,10);
      buckets[key] = 0;
    }
    recs.forEach(r=>{
      const key = r.created_at.slice(0,10);
      if(buckets[key]!==undefined) buckets[key]++;
    });
    _trendData = Object.entries(buckets).map(([date,count])=>({date,count}));
  }catch(e){ _trendData=[]; }
  S._trendsLoading=false; render();
}

function onTrendFileChange(id){ _trendsFileId=id; loadTrendData(); }
function onTrendRangeChange(days){ _trendsRange=parseInt(days); loadTrendData(); }

          <svg viewBox="0 0 ${W} ${H}" style="width:100%;min-width:${Math.max(W,_trendData.length*30)}px" xmlns="http://www.w3.org/2000/svg">
            <defs>

async function loadPerformanceTab(){
  S.adminTab='perf'; S._perfLoading=true; render();
  try{
    await loadAll();
    const allRecs = await GET('records','?select=agent_name,created_at,admin_data,treated_at,file_id');
    // group by agent
    const byAgent = {};
    allRecs.forEach(r=>{
      const name = r.agent_name || 'ללא שיוך';
      if(!byAgent[name]) byAgent[name] = {name, total:0, treated:0, avgTreatHours:[], files:new Set()};
      byAgent[name].total++;
      byAgent[name].files.add(r.file_id);
      if(r.treated_at){
        byAgent[name].treated++;
        const hours = (new Date(r.treated_at)-new Date(r.created_at))/3600000;
        if(hours>=0) byAgent[name].avgTreatHours.push(hours);
      }
    });
    S._perfData = Object.values(byAgent).map(a=>({
      name:a.name,
      total:a.total,
      treated:a.treated,
      filesCount:a.files.size,
      avgHours: a.avgTreatHours.length ? (a.avgTreatHours.reduce((s,h)=>s+h,0)/a.avgTreatHours.length) : null,
      pct: a.total>0 ? Math.round((a.treated/a.total)*100) : 0
    })).sort((a,b)=>b.total-a.total);
  }catch(e){ S._perfData=[]; showAlert('שגיאה בטעינת ביצועים','error'); }
  S._perfLoading=false; render();
}

async function loadPieData(fileId){
  const f=DB.files.find(x=>x.id===fileId); if(!f) return;
  const af=[...(f.extra_fields||[]),...(f.admin_fields||[])].find(x=>x.id===_pieFieldId);
  if(!af) return;

  const isAdminField=!!(f.admin_fields||[]).find(x=>x.id===_pieFieldId);

  // for admin fields — filter by treated_at (when manager updated)
  // for form fields — filter by created_at (when record was created)
  const dateField = isAdminField ? 'treated_at' : 'created_at';

  const {from,to}=dashPeriodRange(_piePeriod);
  let params=`?file_id=eq.${fileId}&select=admin_data,extra,treated_at,created_at`;
  if(from) params+=`&${dateField}=gte.${encodeURIComponent(from)}`;
  if(to)   params+=`&${dateField}=lt.${encodeURIComponent(to)}`;

  // for admin fields also exclude records where manager hasn't acted yet
  if(isAdminField && _piePeriod!=='all') params+=`&treated_at=not.is.null`;

  let recs=[];
  try{ recs=await GET('records',params); }catch(e){}

  // count values
  const counts={};
  const isAdmin=(f.admin_fields||[]).find(x=>x.id===_pieFieldId);
  recs.forEach(r=>{
    const raw=isAdmin?((r.admin_data||{})[_pieFieldId]):((r.extra||{})[_pieFieldId]);
    let val;
    if(af.type==='checkbox') val=raw?'מסומן':'לא מסומן';
    else val=raw||'ריק';
    counts[val]=(counts[val]||0)+1;
  });

  const total=Object.values(counts).reduce((s,v)=>s+v,0);
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);

  const COLORS=['#2563eb','#16a34a','#dc2626','#d97706','#7c3aed','#0891b2','#db2777','#65a30d','#9333ea','#0284c7'];

  // draw SVG pie
  const area=document.getElementById('pie-chart-area');
  if(!area) return;

  if(!entries.length){
    area.innerHTML='<div class="empty" style="padding:20px"><i class="ti ti-database-off"></i><p>אין נתונים לתקופה זו</p></div>';
    return;
  }

  // calculate pie slices
  const cx=120,cy=120,r=100;
  let angle=-Math.PI/2;
  const slices=entries.map(([label,count],i)=>{
    const pct=count/total;
    const startA=angle;
    angle+=pct*2*Math.PI;
    const endA=angle;
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(endA),y2=cy+r*Math.sin(endA);
    const large=pct>0.5?1:0;
    const midA=(startA+endA)/2;
    const tx=cx+(r*0.65)*Math.cos(midA),ty=cy+(r*0.65)*Math.sin(midA);
    return {label,count,pct,x1,y1,x2,y2,large,tx,ty,color:COLORS[i%COLORS.length]};
  });

  const paths=slices.map(s=>
    total===1||s.pct===1
      ?`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${s.color}"/>`
      :`<path d="M${cx},${cy} L${s.x1},${s.y1} A${r},${r} 0 ${s.large},1 ${s.x2},${s.y2} Z" fill="${s.color}" opacity=".9"/>`
  ).join('');

  const pctLabels=slices.filter(s=>s.pct>0.06).map(s=>
    `<text x="${s.tx}" y="${s.ty}" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">${Math.round(s.pct*100)}%</text>`
  ).join('');

  const legend=slices.map(s=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:14px;height:14px;border-radius:4px;background:${s.color};flex-shrink:0"></div>
      <div style="font-size:13px;flex:1">${esc(s.label)}</div>
      <div style="font-size:13px;font-weight:700;color:var(--text)">${s.count}</div>
      <div style="font-size:11px;color:var(--text3);min-width:36px;text-align:left">${Math.round(s.pct*100)}%</div>
    </div>`).join('');

  area.innerHTML=`
    <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;justify-content:center;width:100%">
      <svg viewBox="0 0 240 240" width="200" height="200" style="flex-shrink:0">
        ${paths}
        ${pctLabels}
        <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="13" fill="var(--text2)" font-weight="600">${total}</text>
        <text x="${cx}" y="${cy+18}" text-anchor="middle" font-size="10" fill="var(--text3)">רשומות</text>
      </svg>
      <div style="flex:1;min-width:160px">
        <div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase">פילוח לפי ${esc(af.label)}</div>
        ${legend}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)">
          סה"כ: <strong>${total}</strong> רשומות
          <span style="margin-right:8px;font-size:11px">${isAdminField?'· לפי תאריך עדכון מנהל':'· לפי תאריך יצירה'}</span>
        </div>
      </div>
    </div>`;
}
