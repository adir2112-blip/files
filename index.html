<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוקד מובמנט — מערכת קבצים</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23000'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='14' font-family='Arial' fill='white' font-weight='900'%3EM%3E%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f7;--surface:#fff;--surface2:#f5f7fc;--border:#e2e6ef;--border2:#c8cfe0;
  --text:#1a1f36;--text2:#5a6380;--text3:#9198b0;
  --blue:#2563eb;--blue-light:#eff4ff;--blue-dark:#1d4ed8;
  --green:#16a34a;--green-light:#f0fdf4;--red:#dc2626;--red-light:#fef2f2;
  --amber:#d97706;--amber-light:#fffbeb;--purple:#7c3aed;--purple-light:#f5f3ff;
  --black:#111;
  --radius:12px;--radius-sm:8px;--radius-xs:5px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.13);
}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

/* ══ LOGIN ══ */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;padding:16px;overflow:hidden;background:#0d1635}
#login-bg-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.login-wrap{width:100%;max-width:420px;position:relative;z-index:2}
@keyframes fadeUp{from{transform:translateY(22px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.login-card{background:rgba(235,240,255,0.92);border:1px solid rgba(255,255,255,.7);border-radius:22px;padding:36px 32px;box-shadow:0 8px 48px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.9);animation:fadeUp .35s ease;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.login-header{text-align:center;margin-bottom:28px}
.login-movement-logo{display:flex;align-items:center;justify-content:center;margin-bottom:14px;animation:float 5s ease-in-out infinite}
.login-subtitle{font-size:13px;color:rgba(30,50,120,.55);margin-top:4px}
.login-divider{height:1px;background:rgba(30,60,180,.15);margin:20px 0}
.login-section-title{font-size:16px;font-weight:700;color:#1e3a8a;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.mode-btns{display:flex;flex-direction:column;gap:10px}
.mode-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid rgba(30,80,200,.15);border-radius:14px;background:rgba(255,255,255,.6);cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:#1e3a8a;transition:all .22s;text-align:right;width:100%}
.mode-btn:hover{border-color:rgba(37,99,235,.5);background:rgba(255,255,255,.85);transform:translateX(-3px) translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.15)}
.mode-btn .mb-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.mode-btn.agent-btn .mb-icon{background:linear-gradient(135deg,#2563eb,#3b82f6);box-shadow:0 4px 14px rgba(37,99,235,.55)}
.mode-btn.manager-btn .mb-icon{background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 4px 14px rgba(124,58,237,.55)}
.mode-btn .mb-sub{font-size:12px;font-weight:400;color:rgba(30,58,138,.5);margin-top:2px}
.mode-btn .mb-chevron{margin-right:auto;color:rgba(30,58,138,.3);font-size:16px;transition:all .22s}
.mode-btn:hover .mb-chevron{transform:translateX(-4px);color:#2563eb}
.login-back{background:none;border:none;cursor:pointer;font-size:13px;color:rgba(30,58,138,.5);font-family:inherit;display:flex;align-items:center;gap:5px;margin-bottom:18px;padding:0;transition:color .15s}
.login-back:hover{color:#1e3a8a}
.agent-search-wrap{position:relative;margin-bottom:8px}
.agent-search-wrap .ti{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:rgba(30,58,138,.4);font-size:16px;pointer-events:none}
.agent-search-wrap input{padding-right:36px;width:100%;padding-top:10px;padding-bottom:10px;border:1px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;background:rgba(255,255,255,.7);color:#1e3a8a;transition:all .15s}
.agent-search-wrap input::placeholder{color:rgba(30,58,138,.4)}
.agent-search-wrap input:focus{outline:none;border-color:rgba(99,136,255,.55);background:rgba(255,255,255,.11);box-shadow:0 0 0 3px rgba(37,99,235,.18)}
.agent-list{max-height:210px;overflow-y:auto;border:1px solid rgba(30,80,200,.15);border-radius:var(--radius-sm);background:rgba(255,255,255,.75);scrollbar-width:thin}
.agent-list-item{padding:10px 14px;cursor:pointer;font-size:14px;font-weight:500;color:#1e3a8a;border-bottom:1px solid rgba(30,80,200,.08);display:flex;align-items:center;gap:10px;transition:background .12s;user-select:none}
.agent-list-item:last-child{border-bottom:none}
.agent-list-item:hover{background:rgba(37,99,235,.12);color:#1d4ed8}
.agent-list-empty{padding:24px;text-align:center;color:rgba(30,58,138,.4);font-size:13px}
.ali-avatar{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.5px}
.selected-chip{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(37,99,235,.1);border:1.5px solid rgba(37,99,235,.3);border-radius:var(--radius-sm);margin-bottom:18px}
.selected-chip .sc-name{font-weight:700;color:#1d4ed8;font-size:15px;flex:1}
.selected-chip .sc-change{font-size:12px;color:#2563eb;cursor:pointer;text-decoration:underline;white-space:nowrap}
.pin-label{font-size:12px;font-weight:600;color:rgba(30,58,138,.55);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:block}
.pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:4px}
.pin-digit{width:60px;height:68px;border:2px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);font-size:28px;font-weight:800;text-align:center;background:rgba(255,255,255,.7);color:#1e3a8a;font-family:inherit;transition:all .15s}
.pin-digit:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:rgba(30,58,138,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.form-group input{width:100%;background:rgba(255,255,255,.7);border:1px solid rgba(30,80,200,.2);border-radius:var(--radius-sm);color:#1e3a8a;font-size:14px;padding:11px 13px;font-family:inherit;transition:all .15s}
.form-group input::placeholder{color:rgba(30,58,138,.35)}
.form-group input:focus{outline:none;border-color:#2563eb;background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.login-btn{width:100%;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.login-btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 4px 18px rgba(37,99,235,.45)}
.login-btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 28px rgba(37,99,235,.55)}
.login-btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.login-err{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c;font-weight:600;margin-bottom:14px;display:none;align-items:center;gap:8px}
/* ══ APP ══ */
#app-screen{display:none}
.topbar{background:var(--black);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-date{font-size:12px;color:rgba(255,255,255,.45)}
.agent-chip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:13px;color:rgba(255,255,255,.9)}
.agent-chip .ti{font-size:14px;opacity:.7}
.topbar-actions{display:flex;align-items:center;gap:8px}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);margin-bottom:18px;flex-wrap:wrap}
.breadcrumb .bc-link{cursor:pointer;color:var(--blue);font-weight:500}.breadcrumb .bc-link:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:28px 20px}

/* page title */
.page-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:20px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.04em}
.card-title .ti{color:var(--blue);font-size:16px}

/* ORG GRID */
.org-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.org-card{border-radius:var(--radius);padding:0;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);overflow:hidden;border:2px solid transparent;position:relative}
.org-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:rgba(255,255,255,.4)}
.org-card-body{padding:20px 18px 16px}
.org-card-banner{height:8px;width:100%}
.org-card .oc-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.org-card .oc-count{font-size:12px;color:rgba(255,255,255,.7)}
.org-card .oc-logo{width:48px;height:48px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2)}
.pending-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.95);color:#b91c1c;border-radius:20px;font-size:11px;font-weight:700;padding:3px 9px;margin-top:8px}
.admin-alert-bar{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:18px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(217,119,6,.1)}
.aab-title{font-weight:700;color:#92400e;font-size:14px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.aab-items{display:flex;flex-wrap:wrap;gap:8px;flex:1}
.aab-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border:1px solid #fcd34d;border-radius:20px;font-size:13px;color:#78350f;cursor:pointer;transition:background .12s;font-weight:500}
.aab-chip:hover{background:#fef3c7}

/* FILE GRID */
.files-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.file-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 14px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.file-card:hover{border-color:var(--blue);background:var(--blue-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.file-card .fc-icon{font-size:30px;color:var(--blue);margin-bottom:10px;display:block}
.file-card .fc-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.file-card .fc-pending{display:inline-flex;align-items:center;gap:3px;background:#fee2e2;color:#b91c1c;border-radius:20px;font-size:11px;font-weight:700;padding:2px 8px;margin-top:7px}

/* FORMS */
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;padding:10px 13px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.form-input{cursor:pointer}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.97)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-dark)}
.btn-black{background:var(--black);border-color:var(--black);color:#fff}.btn-black:hover{background:#333}
.btn-success{background:var(--green);border-color:var(--green);color:#fff}.btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);border-color:var(--red);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-sm{padding:5px 12px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px}
.btn-ghost{background:transparent;border-color:transparent;color:rgba(255,255,255,.8)}.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}

/* BADGES / TAGS */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.badge-success{background:var(--green-light);color:#15803d}
.badge-warning{background:var(--amber-light);color:var(--amber)}
.badge-info{background:var(--blue-light);color:var(--blue-dark)}
.badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-purple{background:var(--purple-light);color:var(--purple)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text2)}
.tag-blue{background:var(--blue-light);color:var(--blue-dark);border-color:#bfdbfe}
.tag-purple{background:var(--purple-light);color:var(--purple);border-color:#ddd6fe}

/* NAV TABS */
.nav-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:22px}
.nav-tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-family:inherit;letter-spacing:.02em}
.nav-tab:hover{color:var(--text);background:var(--surface2)}
.nav-tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
th{background:var(--surface2);padding:10px 14px;text-align:right;font-weight:700;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;user-select:none;transition:background .12s}
th:hover{background:#e8ecf5;color:var(--text)}
th.admin-col{background:var(--purple-light);color:var(--purple)}
th.admin-col:hover{background:#ede9fe}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
td.admin-col{background:rgba(245,243,255,.3)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
tr:hover td.admin-col{background:var(--purple-light)}

/* ALERTS */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:500}
.alert-success{background:var(--green-light);color:#15803d;border:1px solid #bbf7d0}
.alert-error{background:var(--red-light);color:#b91c1c;border:1px solid #fecaca}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,30,.55);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--radius);padding:30px;width:520px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.modal-title{font-size:18px;font-weight:700;margin-bottom:22px;color:var(--text);display:flex;align-items:center;gap:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:22px;padding-top:16px;border-top:1px solid var(--border)}

/* FIELD EDITOR */
.field-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:start;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.icon-opt{width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid var(--border);background:var(--surface2);font-size:18px;color:var(--text2);transition:all .12s}
.icon-opt:hover,.icon-opt.selected{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}

/* SEARCH / PHONE */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap .ti{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
.search-wrap input{padding-right:36px}
.phone-lookup{border-radius:var(--radius-sm);padding:13px 16px;margin-bottom:14px;font-size:13px}
.phone-lookup .pl-title{font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.phone-lookup .pl-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.phone-lookup .pl-row:last-child{border:none}
.phone-lookup .pl-row span:first-child{color:var(--text3)}
.phone-lookup .pl-row span:last-child{font-weight:600}
.phone-new{background:var(--green-light);border:1px solid #bbf7d0}.phone-new .pl-title{color:var(--green)}
.phone-found{background:var(--amber-light);border:1px solid #fcd34d}.phone-found .pl-title{color:var(--amber)}

/* FILTER BAR */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm)}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--blue)}
.filter-label{font-size:12px;font-weight:600;color:var(--text2);align-self:center;white-space:nowrap}

/* ADMIN INLINE */
.admin-input{padding:5px 9px;border:1px solid var(--border2);border-radius:var(--radius-xs);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);width:100%;min-width:90px;transition:border-color .15s}
.admin-input:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 2px rgba(124,58,237,.1)}
.admin-checkbox{width:17px;height:17px;accent-color:var(--purple);cursor:pointer}

/* SECTION DIVIDER */
.section-divider{font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;padding:10px 0 8px;border-top:1px solid var(--border);margin-top:18px;display:flex;align-items:center;gap:6px}

/* MISC */
.empty{text-align:center;padding:48px 20px;color:var(--text3)}
.empty .ti{font-size:44px;display:block;margin-bottom:12px;opacity:.4}
.empty p{font-size:14px}
.loading{text-align:center;padding:36px;color:var(--text3)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

let sbClient = window.supabase.createClient(SB_URL, SB_KEY);
let currentUser = null;
let allAgents = [];
let _selectedAgent = null;

async function api(method,table,body=null,params=''){
  const r=await fetch(`${SB_REST}/${table}${params}`,{method,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:body?JSON.stringify(body):null});
  if(!r.ok) throw new Error(await r.text());
  const t=await r.text(); return t?JSON.parse(t):null;
}
const GET=(t,p='')=>api('GET',t,null,p);
const POST=(t,b)=>api('POST',t,b);
const PATCH=(t,b,p)=>api('PATCH',t,b,p);
const DEL=(t,p)=>api('DELETE',t,null,p);

document.getElementById('topbar-date').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// ══ LOGIN ══
function showLogin(screen){
  ['mode','agent','manager'].forEach(s=>document.getElementById('ls-'+s).style.display=s===screen?'block':'none');
  if(screen==='agent'){
    document.getElementById('agent-step1').style.display='block';
    document.getElementById('agent-step2').style.display='none';
    document.getElementById('agent-err').style.display='none';
    populateAgents(allAgents);
    setTimeout(()=>{ const el=document.getElementById('agent-search'); if(el){el.value='';el.focus();} },60);
  }
  if(screen==='manager') setTimeout(()=>document.getElementById('mgr-email').focus(),60);
}

async function initLogin(){
  const {data:{session}}=await sbClient.auth.getSession();
  if(session?.user){
    const {data:mgr}=await sbClient.from('app_managers').select('*').eq('email',session.user.email).eq('active',true).single();
    if(mgr){enterApp({name:mgr.name,role:'manager',is_super_admin:mgr.is_super_admin});return;}
  }
  const data=await GET('app_users','?active=eq.true&order=name.asc&select=id,name,pin');
  allAgents=data||[];
  showLogin('mode');
}

function populateAgents(list){
  const el=document.getElementById('agent-list'); if(!el) return;
  if(!list.length){el.innerHTML=`<div class="agent-list-empty"><i class="ti ti-search"></i><br>לא נמצאו נציגים</div>`;return;}
  el.innerHTML=list.map(u=>{
    const initials=u.name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    return `<div class="agent-list-item" onclick="selectAgent(${u.id})">
      <div class="ali-avatar">${initials}</div>
      <span>${esc(u.name)}</span>
      <i class="ti ti-chevron-left" style="margin-right:auto;color:var(--text3);font-size:13px"></i>
    </div>`;
  }).join('');
}

function filterAgents(){
  const q=document.getElementById('agent-search').value.trim();
  populateAgents(q?allAgents.filter(u=>u.name.includes(q)):allAgents);
}

function selectAgent(id){
  _selectedAgent=allAgents.find(u=>u.id===id);
  if(!_selectedAgent) return;
  document.getElementById('agent-step1').style.display='none';
  document.getElementById('agent-step2').style.display='block';
  document.getElementById('agent-err').style.display='none';
  const initials=_selectedAgent.name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  document.getElementById('selected-chip').innerHTML=`
    <div class="ali-avatar" style="width:38px;height:38px;font-size:13px">${initials}</div>
    <span class="sc-name">${esc(_selectedAgent.name)}</span>
    <span class="sc-change" onclick="backToList()">שנה</span>`;
  ['p0','p1','p2','p3'].forEach(id=>document.getElementById(id).value='');
  setTimeout(()=>document.getElementById('p0').focus(),60);
}

function backToList(){
  _selectedAgent=null;
  document.getElementById('agent-step2').style.display='none';
  document.getElementById('agent-step1').style.display='block';
  const s=document.getElementById('agent-search');
  if(s){s.value='';s.focus();}
  populateAgents(allAgents);
}

function pinInput(i){
  const el=document.getElementById('p'+i);
  el.value=el.value.replace(/\D/g,'').slice(0,1);
  if(el.value&&i<3) document.getElementById('p'+(i+1)).focus();
  if(i===3&&el.value) loginAgent();
}
function pinKey(e,i){
  if(e.key==='Backspace'&&!document.getElementById('p'+i).value&&i>0) document.getElementById('p'+(i-1)).focus();
  if(e.key==='Enter') loginAgent();
}

function showLoginErr(elId,msgId,msg){ document.getElementById(elId).style.display='flex'; document.getElementById(msgId).textContent=msg; }

async function loginAgent(){
  document.getElementById('agent-err').style.display='none';
  if(!_selectedAgent){showLoginErr('agent-err','agent-err-msg','בחר שם תחילה');return;}
  const pin=['p0','p1','p2','p3'].map(id=>document.getElementById(id).value).join('');
  if(pin.length<4){showLoginErr('agent-err','agent-err-msg','יש להזין 4 ספרות');return;}
  if(_selectedAgent.pin!==pin){
    showLoginErr('agent-err','agent-err-msg','קוד שגוי — נסה שנית');
    ['p0','p1','p2','p3'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('p0').focus(); return;
  }
  enterApp({name:_selectedAgent.name,role:'agent',is_super_admin:false});
}

async function loginManager(){
  const email=document.getElementById('mgr-email').value.trim();
  const pass=document.getElementById('mgr-pass').value;
  const btn=document.getElementById('mgr-btn');
  document.getElementById('mgr-err').style.display='none';
  if(!email||!pass){showLoginErr('mgr-err','mgr-err-msg','יש למלא מייל וסיסמה');return;}
  btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i> מתחבר...';
  const {error}=await sbClient.auth.signInWithPassword({email,password:pass});
  if(error){showLoginErr('mgr-err','mgr-err-msg','מייל או סיסמה שגויים');btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> כניסה';return;}
  const {data:mgr}=await sbClient.from('app_managers').select('*').eq('email',email).eq('active',true).single();
  if(!mgr){await sbClient.auth.signOut();showLoginErr('mgr-err','mgr-err-msg','אין הרשאת מנהל');btn.disabled=false;btn.innerHTML='<i class="ti ti-login"></i> כניסה';return;}
  enterApp({name:mgr.name,role:'manager',is_super_admin:mgr.is_super_admin});
}

function enterApp(user){
  currentUser=user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  const icon=user.role==='manager'?'ti-shield-check':'ti-user';
  document.getElementById('agent-chip').innerHTML=`<i class="ti ${icon}"></i> ${esc(user.name)}`;
  document.getElementById('admin-btn').style.display=user.role==='manager'?'':'none';
  S.adminLoggedIn=user.role==='manager';
  _agentName=user.name;
  initApp();
}

async function doLogout(){
  if(currentUser?.role==='manager') await sbClient.auth.signOut();
  currentUser=null; _agentName=''; _selectedAgent=null;
  S={...S_DEFAULT()}; DB={orgs:[],files:[]}; _cachedRecords={}; _allRecords=[]; _pendingCounts={};
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('mgr-email').value=''; document.getElementById('mgr-pass').value='';
  document.getElementById('mgr-btn').disabled=false; document.getElementById('mgr-btn').innerHTML='<i class="ti ti-login"></i> כניסה';
  showLogin('mode');
}

// ══ APP STATE ══
function S_DEFAULT(){return{view:'orgs',orgId:null,fileId:null,adminLoggedIn:false,adminTab:'orgs',searchQ:'',alert:null,filters:{},phoneSearch:'',phoneLookup:null,sortCol:null,sortDir:1};}
let S=S_DEFAULT();
let DB={orgs:[],files:[]};
let _agentName='';
let _tmpIcon='ti-file',_tmpFields=[],_tmpAdminFields=[];
let _cachedRecords={},_allRecords=[];
let _saveTimers={};
let _modalLocked=false;
let _pendingCounts={};

async function loadAll(){[DB.orgs,DB.files]=await Promise.all([GET('organizations','?order=created_at.asc'),GET('files','?order=created_at.asc')]);}
async function getRecords(fileId){const r=await GET('records',`?file_id=eq.${fileId}&order=created_at.desc`);_cachedRecords[fileId]=r;return r;}

// pending
function isRecordPending(record,file){
  const rules=file.pending_rules||{};
  for(const af of(file.admin_fields||[])){
    const rule=rules[af.id]||'ignore'; if(rule==='ignore') continue;
    const val=(record.admin_data||{})[af.id];
    if(rule==='must_fill'&&(!val||val.toString().trim()==='')) return true;
    if(rule==='must_check'&&(!val||val===false||val==='false')) return true;
    if(rule.startsWith('value:')&&(val||'').toString()!==rule.slice(6)) return true;
  }
  return false;
}
async function loadPendingCounts(){
  _pendingCounts={};
  const files=DB.files.filter(f=>Object.values(f.pending_rules||{}).some(r=>r!=='ignore'));
  await Promise.all(files.map(async f=>{
    try{const recs=await GET('records',`?file_id=eq.${f.id}&select=id,admin_data`);_pendingCounts[f.id]=recs.filter(r=>isRecordPending(r,f)).length;}catch(e){_pendingCounts[f.id]=0;}
  }));
}
function pendingForOrg(id){return DB.files.filter(f=>f.org_id===id).reduce((s,f)=>s+(_pendingCounts[f.id]||0),0);}
function totalPending(){return Object.values(_pendingCounts).reduce((s,v)=>s+v,0);}

// ── RENDER ──
function render(){
  const app=document.getElementById('app');
  let html=S.alert?`<div class="alert alert-${S.alert.type}"><i class="ti ${S.alert.type==='success'?'ti-check':'ti-alert-circle'}"></i>${S.alert.msg}</div>`:'';
  html+=renderBreadcrumb();
  if(S.view==='orgs')         html+=renderOrgs();
  else if(S.view==='files')   html+=renderFiles();
  else if(S.view==='form')    html+=renderForm();
  else if(S.view==='records') html+=renderRecordsPage();
  else if(S.view==='admin')   html+=renderAdmin();
  app.innerHTML=html;
}
function renderBreadcrumb(){
  if(S.view==='orgs'||S.view==='admin') return '';
  const org=DB.orgs.find(o=>o.id===S.orgId),file=DB.files.find(f=>f.id===S.fileId);
  let c=`<span class="bc-link" onclick="goOrgs()">ארגונים</span>`;
  if(org) c+=`<span>›</span><span class="bc-link" onclick="goFiles()">${esc(org.name)}</span>`;
  if(file&&(S.view==='form'||S.view==='records')) c+=`<span>›</span><span>${esc(file.name)}</span>`;
  return `<div class="breadcrumb">${c}</div>`;
}

// ORGS
function renderOrgs(){
  if(!DB.orgs.length) return `<div class="empty"><i class="ti ti-building-off"></i><p>אין ארגונים.</p></div>`;
  const totalP=totalPending();
  const alertBar=S.adminLoggedIn&&totalP>0?`<div class="admin-alert-bar">
    <div class="aab-title"><i class="ti ti-bell-ringing"></i> ממתינים לטיפול</div>
    <div class="aab-items">${DB.files.filter(f=>(_pendingCounts[f.id]||0)>0).map(f=>{
      const o=DB.orgs.find(x=>x.id===f.org_id);
      return `<div class="aab-chip" onclick="adminViewFileRecords('${f.id}')"><i class="ti ti-folder"></i>${esc(o?o.name:'')} › ${esc(f.name)}<span style="background:#fca5a5;color:#7f1d1d;border-radius:20px;padding:1px 8px;font-weight:800;font-size:11px">${_pendingCounts[f.id]}</span></div>`;
    }).join('')}</div></div>`:'';
  return alertBar+`<div class="page-title">בחר ארגון</div><div class="page-sub">לחץ על הארגון הרלוונטי להזנת פניות</div>
  <div class="org-grid">${DB.orgs.map(o=>{
    const st=orgStyle(o.name);
    const p=pendingForOrg(o.id);
    const pb=S.adminLoggedIn&&p>0?`<div class="pending-badge"><i class="ti ti-clock" style="font-size:10px"></i> ${p} ממתינים</div>`:'';
    return `<div class="org-card" onclick="goFiles('${o.id}')" style="background:${st.bg}">
      <div class="org-card-body">
        <div class="org-card-logo">${st.logo}</div>
        <div class="oc-name">${esc(o.name)}</div>
        <div class="oc-count">${DB.files.filter(f=>f.org_id===o.id).length} קבצים</div>
        ${pb}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// FILES
function renderFiles(){
  const orgFiles=DB.files.filter(f=>f.org_id===S.orgId);
  if(!orgFiles.length) return `<div class="empty"><i class="ti ti-folder-off"></i><p>אין קבצים לארגון זה.</p></div>`;
  const org=DB.orgs.find(o=>o.id===S.orgId);
  return `<div class="page-title">${org?esc(org.name):''}</div><div class="page-sub">בחר קובץ לעדכון</div>
  <div class="files-grid">${orgFiles.map(f=>{
    const p=S.adminLoggedIn?(_pendingCounts[f.id]||0):0;
    const pb=p>0?`<div class="fc-pending"><i class="ti ti-clock" style="font-size:10px"></i> ${p}</div>`:'';
    return `<div class="file-card" onclick="goForm('${f.id}')">
      <i class="ti ${f.icon||'ti-file'} fc-icon"></i>
      <div class="fc-name">${esc(f.name)}</div>${pb}
    </div>`;
  }).join('')}</div>`;
}

// FORM
function renderForm(){
  const f=DB.files.find(x=>x.id===S.fileId); if(!f) return '';
  const extraF=(f.extra_fields||[]).map(ef=>{
    const req=ef.required?'required':'';
    const reqMark=ef.required?`<span style="color:var(--red);margin-right:3px">*</span>`:'';
    let inp='';
    if(ef.type==='select'){const opts=(ef.options||'').split(',').map(o=>`<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('');inp=`<select class="form-input" name="extra_${ef.id}" ${req}><option value="">בחר...</option>${opts}</select>`;}
    else if(ef.type==='number') inp=`<input class="form-input" type="number" name="extra_${ef.id}" placeholder="${esc(ef.label)}" ${req}>`;
    else if(ef.type==='checkbox') inp=`<div style="padding:8px 0"><input type="checkbox" name="extra_${ef.id}" style="width:18px;height:18px;accent-color:var(--blue);cursor:pointer;vertical-align:middle"> <span style="font-size:14px;color:var(--text)">${esc(ef.label)}</span></div>`;
    else inp=`<input class="form-input" type="text" name="extra_${ef.id}" placeholder="${esc(ef.label)}" ${req}>`;
    if(ef.type==='checkbox') return `<div class="form-row">${inp}</div>`;
    return `<div class="form-row"><label class="form-label">${reqMark}${esc(ef.label)}</label>${inp}</div>`;
  }).join('');
  return `<div class="card">
    <div class="flex-between" style="margin-bottom:18px">
      <div class="card-title" style="margin-bottom:0;border:none;padding:0"><i class="ti ${f.icon||'ti-file'}"></i>${esc(f.name)}</div>
      <div class="flex-gap">
        <button class="btn btn-sm" onclick="goRecords('${f.id}')"><i class="ti ti-list"></i> רשומות</button>
        <button class="btn btn-sm btn-success" onclick="exportFile('${f.id}')"><i class="ti ti-download"></i> ייצוא Excel</button>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label"><i class="ti ti-phone" style="font-size:12px"></i> חיפוש לפי טלפון</label>
      <div class="search-wrap" style="margin-bottom:0">
        <input class="form-input" id="phone-search-input" type="text" dir="ltr" placeholder="05X-XXXXXXX" value="${esc(S.phoneSearch)}" oninput="onPhoneSearch(this.value)">
        <i class="ti ti-search"></i>
      </div>
    </div>
    <div id="lookup-box"></div>
    <form id="entry-form" onsubmit="submitRecord(event,'${f.id}')">
      <div class="form-grid-2">
        <div class="form-row"><label class="form-label">שם פרטי *</label><input class="form-input" name="first_name" required placeholder="שם פרטי"></div>
        <div class="form-row"><label class="form-label">שם משפחה *</label><input class="form-input" name="last_name" required placeholder="שם משפחה"></div>
        <div class="form-row"><label class="form-label">טלפון *</label><input class="form-input" name="phone" id="phone-form-input" required placeholder="05X-XXXXXXX" dir="ltr" value="${esc(S.phoneSearch)}"></div>
        <div class="form-row"><label class="form-label">ת"ז *</label><input class="form-input" name="id_num" required placeholder="9 ספרות" dir="ltr" maxlength="9"></div>
      </div>
      ${extraF}
      <div class="mt-2 flex-gap">
        <button type="submit" class="btn btn-black" id="submit-btn"><i class="ti ti-check"></i> שמור רשומה</button>
        <span style="font-size:12px;color:var(--text3)"><i class="ti ti-user" style="font-size:12px"></i> ${esc(_agentName)}</span>
      </div>
    </form>
  </div>`;
}

let _phoneTimer=null;
function onPhoneSearch(val){
  S.phoneSearch=val; S.phoneLookup=null;
  clearTimeout(_phoneTimer);
  if(val.replace(/\D/g,'').length>=9){
    _phoneTimer=setTimeout(async()=>{
      try{ S.phoneLookup=await GET('records',`?file_id=eq.${S.fileId}&phone=ilike.*${encodeURIComponent(val.replace(/[-\s]/g,''))}*&order=created_at.desc&limit=1`); }
      catch(e){S.phoneLookup=[];}
      renderLookupOnly();
    },700);
  } else { const b=document.getElementById('lookup-box'); if(b) b.innerHTML=''; }
}
function renderLookupOnly(){
  const box=document.getElementById('lookup-box'); if(!box) return;
  const f=DB.files.find(x=>x.id===S.fileId); if(!f) return;
  if(!S.phoneLookup){box.innerHTML='';return;}
  if(!S.phoneLookup.length){
    box.innerHTML=`<div class="phone-lookup phone-new"><div class="pl-title"><i class="ti ti-circle-check"></i> לקוח חדש — לא נמצא בקובץ זה</div></div>`;
  } else {
    const ex=S.phoneLookup[0];
    const extraRows=(f.extra_fields||[]).map(ef=>`<div class="pl-row"><span>${esc(ef.label)}</span><span>${esc((ex.extra||{})[ef.id]||'—')}</span></div>`).join('');
    box.innerHTML=`<div class="phone-lookup phone-found">
      <div class="pl-title"><i class="ti ti-alert-triangle"></i> לקוח קיים בקובץ זה</div>
      <div class="pl-row"><span>שם</span><span>${esc(ex.first_name)} ${esc(ex.last_name)}</span></div>
      <div class="pl-row"><span>ת"ז</span><span>${esc(ex.id_num)}</span></div>
      <div class="pl-row"><span>תאריך</span><span>${fmtDate(ex.created_at)}</span></div>
      ${extraRows}
    </div>`;
  }
}

// RECORDS PAGE
// ── BULK SELECTION STATE ──
let _selectedRows = new Set(); // record IDs
let _bulkMode = false;

function toggleBulkMode(){
  _bulkMode=!_bulkMode;
  _selectedRows.clear();
  render();
}
function toggleRowSelect(id){
  if(_selectedRows.has(id)) _selectedRows.delete(id);
  else _selectedRows.add(id);
  // update checkboxes without full re-render
  const cb=document.getElementById('row-cb-'+id);
  if(cb) cb.checked=_selectedRows.has(id);
  updateBulkBar();
}
function selectAllFiltered(){
  const ids=JSON.parse(document.getElementById('filtered-ids').value||'[]');
  ids.forEach(id=>_selectedRows.add(id));
  render();
}
function deselectAll(){
  _selectedRows.clear();
  render();
}
function updateBulkBar(){
  const bar=document.getElementById('bulk-bar');
  if(!bar) return;
  const count=_selectedRows.size;
  bar.innerHTML=bulkBarHTML(count);
}
function bulkBarHTML(count){
  const f=DB.files.find(x=>x.id===S.fileId);
  const adminFields=(f?.admin_fields||[]);
  const checkboxFields=adminFields.filter(af=>af.type==='checkbox');
  const selectFields=adminFields.filter(af=>af.type==='select');
  return `
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%">
      <span style="font-size:13px;font-weight:700;color:var(--blue-dark);white-space:nowrap;background:var(--blue-light);padding:4px 10px;border-radius:20px">
        <i class="ti ti-checks"></i> ${count} נבחרו
      </span>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1">
        ${checkboxFields.map(af=>`
          <button class="btn btn-sm btn-success" onclick="bulkSetField('${af.id}',true)"><i class="ti ti-check"></i> סמן "${esc(af.label)}"</button>
          <button class="btn btn-sm" style="border-color:var(--border2)" onclick="bulkSetField('${af.id}',false)"><i class="ti ti-x"></i> בטל "${esc(af.label)}"</button>
        `).join('')}
        ${selectFields.map(af=>`
          <div style="display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px 10px">
            <span style="font-size:12px;font-weight:600;color:var(--text2);white-space:nowrap">${esc(af.label)}:</span>
            <select class="admin-input" style="min-width:90px;border:none;padding:2px 6px" onchange="if(this.value)bulkSetField('${af.id}',this.value)">
              <option value="">בחר...</option>
              ${(af.options||'').split(',').map(o=>`<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('')}
            </select>
          </div>
        `).join('')}
        ${adminFields.length ? '<div style="width:1px;height:24px;background:var(--border);margin:0 2px"></div>' : ''}
        <button class="btn btn-sm btn-success" onclick="exportSelected()"><i class="ti ti-download"></i> ייצוא נבחרים</button>
        <button class="btn btn-sm btn-danger" onclick="bulkDelete()"><i class="ti ti-trash"></i> מחק נבחרים</button>
      </div>
      <button class="btn btn-xs" onclick="deselectAll()" title="בטל בחירה" style="padding:5px 8px"><i class="ti ti-x"></i></button>
    </div>`;
}

async function exportSelected(){
  if(_selectedRows.size===0) return;
  const fileId=S.fileId;
  const f=DB.files.find(x=>x.id===fileId); if(!f) return;
  const records=(_cachedRecords[fileId]||[]).filter(r=>_selectedRows.has(r.id));
  const extra=f.extra_fields||[],admin=f.admin_fields||[];
  const headers=['תאריך','שם פרטי','שם משפחה','טלפון','ת"ז','נציג',...extra.map(ef=>ef.label),...admin.map(af=>'[ניהולי] '+af.label)];
  const rows=records.map(r=>[fmtDate(r.created_at),r.first_name,r.last_name,r.phone,r.id_num,r.agent_name||'',...extra.map(ef=>(r.extra||{})[ef.id]||''),...admin.map(af=>{const v=(r.admin_data||{})[af.id];return af.type==='checkbox'?(v?'כן':'לא'):(v||'');})]);
  buildXLSX(f.name+'_נבחרים',headers,rows,admin.map((_,i)=>6+extra.length+i));
  showAlert(`ייצא ${records.length} רשומות נבחרות`,'success');
}

async function bulkDelete(){
  if(_selectedRows.size===0) return;
  if(!confirm(`למחוק ${_selectedRows.size} רשומות? פעולה זו אינה ניתנת לביטול.`)) return;
  const ids=[..._selectedRows];
  const fileId=S.fileId;
  await Promise.all(ids.map(id=>DEL('records',`?id=eq.${id}`)));
  if(_cachedRecords[fileId]) _cachedRecords[fileId]=_cachedRecords[fileId].filter(r=>!ids.includes(r.id));
  _allRecords=_allRecords.filter(r=>!ids.includes(r.id));
  await loadPendingCounts();
  _selectedRows.clear();
  _bulkMode=false;
  render();
  showAlert(`נמחקו ${ids.length} רשומות`,'success');
}

async function bulkSetField(fieldId, value){
  if(_selectedRows.size===0){ showAlert('לא נבחרו רשומות','error'); return; }
  const fileId=S.fileId;
  const f=DB.files.find(x=>x.id===fileId);
  const af=(f?.admin_fields||[]).find(x=>x.id===fieldId);
  if(!af) return;
  const label=af.label;
  const displayVal=typeof value==='boolean'?(value?'✓ מסומן':'✗ מבוטל'):value;
  if(!confirm(`לסמן "${label}" = "${displayVal}" על ${_selectedRows.size} רשומות?`)) return;

  const ids=[..._selectedRows];
  let done=0;
  // show progress
  showAlert(`מעדכן 0 / ${ids.length}...`,'success');

  await Promise.all(ids.map(async id=>{
    const recs=_cachedRecords[fileId]||[];
    const record=recs.find(r=>r.id===id);
    if(!record) return;
    if(!record.admin_data) record.admin_data={};
    record.admin_data[fieldId]=value;
    await PATCH('records',{admin_data:record.admin_data},`?id=eq.${id}`);
    done++;
  }));

  await loadPendingCounts();
  _selectedRows.clear();
  _bulkMode=false;
  render();
  showAlert(`✓ עודכנו ${done} רשומות בהצלחה`,'success');
}

function renderRecordsPage(){
  const f=DB.files.find(x=>x.id===S.fileId); if(!f) return '';
  const isAdmin=S.adminLoggedIn;
  const records=_cachedRecords[S.fileId]||[];
  const extraFields=f.extra_fields||[],adminFields=f.admin_fields||[];
  const q=(S.searchQ||'').toLowerCase();
  let filtered=q?records.filter(r=>(r.first_name+' '+r.last_name+' '+r.phone+' '+r.id_num+' '+(r.agent_name||'')).toLowerCase().includes(q)):records;
  Object.entries(S.filters||{}).forEach(([afId,val])=>{
    if(!val) return;
    const af=adminFields.find(x=>x.id===afId); if(!af) return;
    filtered=filtered.filter(r=>{
      const v=((r.admin_data||{})[afId]||'').toString().toLowerCase();
      if(af.type==='checkbox') return val==='yes'?(v==='true'):(v!=='true');
      return v.includes(val.toLowerCase());
    });
  });
  const sortable=(col,label,cls='')=>{
    const active=S.sortCol===col;
    const arrow=active?(S.sortDir===1?'↑':'↓'):'';
    return `<th class="${cls}" onclick="toggleSort('${col}')">${label}${arrow?` <span style="color:var(--blue)">${arrow}</span>`:' <span style="opacity:.3;font-size:10px">⇅</span>'}</th>`;
  };
  if(S.sortCol){
    const col=S.sortCol;
    filtered=[...filtered].sort((a,b)=>{
      let va='',vb='';
      if(col==='date'){va=a.created_at;vb=b.created_at;}
      else if(col==='first_name'){va=a.first_name;vb=b.first_name;}
      else if(col==='last_name'){va=a.last_name;vb=b.last_name;}
      else if(col==='phone'){va=a.phone;vb=b.phone;}
      else if(col==='id_num'){va=a.id_num;vb=b.id_num;}
      else if(col==='agent'){va=a.agent_name||'';vb=b.agent_name||'';}
      else if(col.startsWith('extra_')){const id=col.slice(6);va=(a.extra||{})[id]||'';vb=(b.extra||{})[id]||'';}
      else if(col.startsWith('admin_')){const id=col.slice(6);va=((a.admin_data||{})[id]||'').toString();vb=((b.admin_data||{})[id]||'').toString();}
      if(va<vb) return -S.sortDir; if(va>vb) return S.sortDir; return 0;
    });
  }

  const filteredIds=filtered.map(r=>r.id);
  const allSelectedInFiltered=filteredIds.length>0&&filteredIds.every(id=>_selectedRows.has(id));

  const bulkCheckH=isAdmin&&_bulkMode?`<th style="width:36px;text-align:center">
    <input type="checkbox" title="בחר הכל" ${allSelectedInFiltered?'checked':''} style="accent-color:var(--blue);width:15px;height:15px;cursor:pointer" onchange="${allSelectedInFiltered?'deselectAll()':'selectAllFiltered()'}">
  </th>`:'';
  const extraH=extraFields.map(ef=>sortable('extra_'+ef.id,esc(ef.label))).join('');
  const adminH=adminFields.map(af=>sortable('admin_'+af.id,'<i class="ti ti-shield-check" style="font-size:10px"></i> '+esc(af.label),'admin-col')).join('');
  const delH=isAdmin?'<th></th>':'';

  const rows=filtered.map(r=>{
    const isSelected=_selectedRows.has(r.id);
    const bulkCb=isAdmin&&_bulkMode?`<td style="text-align:center;background:${isSelected?'var(--blue-light)':''}">
      <input type="checkbox" id="row-cb-${r.id}" ${isSelected?'checked':''} style="accent-color:var(--blue);width:15px;height:15px;cursor:pointer" onchange="toggleRowSelect('${r.id}')">
    </td>`:'';
    const rowStyle=isSelected?'background:var(--blue-light)':'';
    const extraC=extraFields.map(ef=>{
      const v=(r.extra||{})[ef.id]||'';
      if(ef.type==='select'&&v){const cls=v==='טופל'?'badge-success':v==='לא טופל'?'badge-warning':'badge-info';return `<td><span class="badge ${cls}">${esc(v)}</span></td>`;}
      return `<td>${esc(v)}</td>`;
    }).join('');
    const adminC=adminFields.map(af=>{
      const val=(r.admin_data||{})[af.id];
      if(!isAdmin){
        if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center">${val?'<i class="ti ti-check" style="color:var(--green)"></i>':'<i class="ti ti-x" style="color:var(--text3)"></i>'}</td>`;
        if(af.type==='select'){const cls=val==='כן'||val==='מאושר'?'badge-success':val==='לא'||val==='דחוי'?'badge-warning':'badge-info';return `<td class="admin-col">${val?`<span class="badge ${cls}">${esc(val)}</span>`:''}</td>`;}
        return `<td class="admin-col">${esc(val||'')}</td>`;
      }
      if(_bulkMode){
        // in bulk mode show read-only admin fields
        if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center">${val?'<i class="ti ti-check" style="color:var(--green)"></i>':'<i class="ti ti-x" style="color:var(--text3);opacity:.4"></i>'}</td>`;
        if(af.type==='select'){const cls=val==='כן'||val==='מאושר'?'badge-success':val==='לא'||val==='דחוי'?'badge-warning':'badge-info';return `<td class="admin-col">${val?`<span class="badge ${cls}">${esc(val)}</span>`:''}</td>`;}
        return `<td class="admin-col" style="color:var(--text3)">${esc(val||'—')}</td>`;
      }
      if(af.type==='checkbox') return `<td class="admin-col" style="text-align:center"><input type="checkbox" class="admin-checkbox" ${val?'checked':''} onchange="saveAdminField('${r.id}','${af.id}',this.checked,'${S.fileId}')"></td>`;
      if(af.type==='select'){const opts=(af.options||'').split(',').map(o=>`<option value="${esc(o.trim())}" ${val===o.trim()?'selected':''}>${esc(o.trim())}</option>`).join('');return `<td class="admin-col"><select class="admin-input" onchange="saveAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"><option value="">--</option>${opts}</select></td>`;}
      return `<td class="admin-col"><input class="admin-input" type="text" value="${esc(val||'')}" placeholder="הזן..." oninput="debounceAdminField('${r.id}','${af.id}',this.value,'${S.fileId}')"></td>`;
    }).join('');
    const agentC=`<td><span class="badge badge-neutral">${esc(r.agent_name||'—')}</span></td>`;
    const delC=isAdmin&&!_bulkMode?`<td><button class="btn btn-xs btn-danger" onclick="confirmDelRecord('${r.id}','${S.fileId}')"><i class="ti ti-trash"></i></button></td>`:(isAdmin?'<td></td>':'');
    const trStyle=`${isSelected?'background:var(--blue-light);':rowStyle}${_bulkMode?';cursor:pointer':''}`;
    return `<tr style="${trStyle}" onclick="${_bulkMode?`event.stopPropagation();toggleRowSelect('${r.id}')`:''}">${bulkCb}<td style="font-size:12px;white-space:nowrap;color:var(--text3)">${fmtDate(r.created_at)}</td><td><strong>${esc(r.first_name)}</strong></td><td>${esc(r.last_name)}</td><td dir="ltr">${esc(r.phone)}</td><td dir="ltr">${esc(r.id_num)}</td>${extraC}${agentC}${adminC}${delC}</tr>`;
  }).join('');

  const filterBar=adminFields.length?`<div class="filter-bar">
    <span class="filter-label"><i class="ti ti-filter"></i> סינון:</span>
    ${adminFields.map(af=>{
      if(af.type==='checkbox') return `<select onchange="setFilter('${af.id}',this.value)"><option value="">כל ${esc(af.label)}</option><option value="yes">✓ מסומן</option><option value="no">✗ לא מסומן</option></select>`;
      if(af.type==='select') return `<select onchange="setFilter('${af.id}',this.value)"><option value="">כל ${esc(af.label)}</option>${(af.options||'').split(',').map(o=>`<option value="${esc(o.trim())}">${esc(o.trim())}</option>`).join('')}</select>`;
      return `<input type="text" placeholder="סנן ${esc(af.label)}..." value="${esc(S.filters[af.id]||'')}" oninput="setFilter('${af.id}',this.value)" style="min-width:130px">`;
    }).join('')}
    <button class="btn btn-xs" onclick="S.filters={};render()"><i class="ti ti-x"></i> נקה</button>
  </div>`:'';

  // bulk action bar
  const bulkBar=isAdmin&&_bulkMode&&_selectedRows.size>0?`
    <div id="bulk-bar" style="background:var(--blue-light);border:1.5px solid var(--blue);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      ${bulkBarHTML(_selectedRows.size)}
    </div>`:'';

  // "select all filtered" shortcut
  const selectAllBtn=isAdmin&&_bulkMode&&filtered.length>0&&!allSelectedInFiltered?`
    <button class="btn btn-sm btn-primary" style="margin-bottom:10px" onclick="selectAllFiltered()">
      <i class="ti ti-checks"></i> בחר את כל ${filtered.length} הרשומות המסוננות
    </button>`:'';

  return `<div class="card">
    <div class="flex-between" style="margin-bottom:16px">
      <div class="card-title" style="margin-bottom:0;border:none;padding:0"><i class="ti ${f.icon||'ti-file'}"></i>${esc(f.name)} — רשומות</div>
      <div class="flex-gap">
        ${isAdmin?`<button class="btn btn-sm ${_bulkMode?'btn-primary':''}" onclick="toggleBulkMode()" title="עריכה מרובה">
          <i class="ti ti-${_bulkMode?'x':'checkbox'}"></i> ${_bulkMode?'בטל בחירה':'בחירה מרובה'}
        </button>`:''}
        <button class="btn btn-sm" onclick="goForm('${f.id}')"><i class="ti ti-edit"></i> הזנה חדשה</button>
        <button class="btn btn-sm btn-success" onclick="exportFile('${f.id}')"><i class="ti ti-download"></i> ייצוא Excel</button>
      </div>
    </div>
    ${adminFields.length?`<div style="margin-bottom:12px"><span class="badge badge-purple"><i class="ti ti-shield-check"></i> שדות ניהוליים: ${adminFields.map(af=>esc(af.label)).join(', ')}</span></div>`:''}
    <div class="search-wrap">

// ── SUBMIT ──
async function submitRecord(e,fileId){
  e.preventDefault();
  const form=e.target,btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> שומר...';
  const f=DB.files.find(x=>x.id===fileId);
  const extra={};
  (f.extra_fields||[]).forEach(ef=>{
    const el=form[`extra_${ef.id}`];
    if(!el) return;
    if(ef.type==='checkbox') extra[ef.id]=el.checked?'כן':'לא';
    else extra[ef.id]=el.value.trim();
  });
  try{
    await POST('records',{file_id:fileId,first_name:form.first_name.value.trim(),last_name:form.last_name.value.trim(),phone:form.phone.value.trim(),id_num:form.id_num.value.trim(),extra,admin_data:{},agent_name:_agentName});
    form.reset();S.phoneSearch='';S.phoneLookup=null;
    await loadPendingCounts();
    showAlert('הרשומה נשמרה בהצלחה ✓','success');
  }catch(err){showAlert('שגיאה: '+err.message,'error');}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i> שמור רשומה';
}

// ── ADMIN INLINE ──
async function saveAdminField(recordId,fieldId,value,fileId){
  const recs=_cachedRecords[fileId]||[];
  const record=recs.find(r=>r.id===recordId);if(!record)return;
  if(!record.admin_data)record.admin_data={};
  record.admin_data[fieldId]=value;
  try{await PATCH('records',{admin_data:record.admin_data},`?id=eq.${recordId}`);await loadPendingCounts();}
  catch(e){showAlert('שגיאה בשמירה','error');}
}
function debounceAdminField(recordId,fieldId,value,fileId){
  const key=recordId+'_'+fieldId;clearTimeout(_saveTimers[key]);
  _saveTimers[key]=setTimeout(()=>saveAdminField(recordId,fieldId,value,fileId),700);
}

function confirmDelRecord(id,fileId){
  showModal(`<div class="modal-title" style="color:var(--red)"><i class="ti ti-alert-triangle"></i> מחיקת רשומה</div>
    <p style="color:var(--text2);margin-bottom:8px">האם אתה בטוח? פעולה זו אינה ניתנת לביטול.</p>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">ביטול</button><button class="btn btn-danger" onclick="doDelRecord('${id}','${fileId||''}')"><i class="ti ti-trash"></i> מחק לצמיתות</button></div>`);
}
async function doDelRecord(id,fileId){
  closeModal();
  await DEL('records',`?id=eq.${id}`);
  if(fileId&&fileId!=='null'){await getRecords(fileId);}else{_allRecords=_allRecords.filter(r=>r.id!==id);}
  await loadPendingCounts();render();showAlert('הרשומה נמחקה','success');
}

function openNewFile(){_tmpIcon='ti-file';_tmpFields=[];_tmpAdminFields=[];showModal(fileModalHTML({name:'',icon:'ti-file',org_id:'',extra_fields:[],admin_fields:[],pending_rules:{}},'new'));}
function openEditFile(id){const f=DB.files.find(x=>x.id===id);_tmpIcon=f.icon||'ti-file';_tmpFields=JSON.parse(JSON.stringify(f.extra_fields||[]));_tmpAdminFields=JSON.parse(JSON.stringify(f.admin_fields||[]));showModal(fileModalHTML(f,'edit',id));}
function fileModalHTML(f,mode,id=''){
  const orgOpts=DB.orgs.map(o=>`<option value="${o.id}" ${f.org_id===o.id?'selected':''}>${esc(o.name)}</option>`).join('');
  const iconsH=ICONS.map(ic=>`<div class="icon-opt ${_tmpIcon===ic?'selected':''}" data-icon="${ic}" onclick="pickIcon('${ic}')"><i class="ti ${ic}"></i></div>`).join('');
  const fieldRows=_tmpFields.map((ef,i)=>fieldRowHTML(ef,i,'f')).join('');
  const adminRows=_tmpAdminFields.map((af,i)=>fieldRowHTML(af,i,'a')).join('');
  const rules=f.pending_rules||{};
  const pendingHTML=_tmpAdminFields.filter(af=>af.label).length?`
    <div class="section-divider" style="color:#b45309"><i class="ti ti-bell"></i> הגדרת סטטוס "ממתין לטיפול"</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">מתי רשומה תיחשב "ממתינה" ותופיע כ-badge אדום</div>
    ${_tmpAdminFields.filter(af=>af.label).map(af=>{
      const rule=rules[af.id]||'ignore';
      let opts=`<option value="ignore" ${rule==='ignore'?'selected':''}>התעלם</option><option value="must_fill" ${rule==='must_fill'?'selected':''}>חייב להיות מלא</option>`;
      if(af.type==='checkbox')opts+=`<option value="must_check" ${rule==='must_check'?'selected':''}>חייב מסומן ✓</option>`;
      if(af.type==='select'&&af.options)af.options.split(',').forEach(o=>{const v='value:'+o.trim();opts+=`<option value="${esc(v)}" ${rule===v?'selected':''}>${esc(o.trim())}</option>`;});
      return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px">
        <div style="font-size:13px;font-weight:600;color:var(--purple);display:flex;align-items:center;gap:6px"><i class="ti ti-shield-check"></i>${esc(af.label)}</div>
        <select class="form-input" style="font-size:13px;padding:6px 10px" data-pr="${af.id}">${opts}</select>
      </div>`;
    }).join('')}`:'';
  const saveBtn=mode==='new'?`<button class="btn btn-black" onclick="saveNewFile()"><i class="ti ti-check"></i> צור קובץ</button>`:`<button class="btn btn-black" onclick="saveEditFile('${id}')"><i class="ti ti-check"></i> שמור</button>`;
  return `<div class="modal-title"><i class="ti ${mode==='new'?'ti-plus':'ti-edit'}" style="color:var(--blue)"></i> ${mode==='new'?'קובץ חדש':'עריכת קובץ'}</div>
    <div class="form-row"><label class="form-label">ארגון *</label><select class="form-input" id="mf-org"><option value="">בחר ארגון...</option>${orgOpts}</select></div>
    <div class="form-row"><label class="form-label">שם הקובץ *</label><input class="form-input" id="mf-name" value="${esc(f.name)}" placeholder="שם הקובץ"></div>
    <div class="form-row"><label class="form-label">אייקון</label><div class="icon-picker" id="icon-picker">${iconsH}</div></div>
    <div class="form-row"><label class="form-label">שדות טופס (נציג ממלא)</label><div id="field-list">${fieldRows}</div><button class="btn btn-sm mt-1" type="button" onclick="addField('f')"><i class="ti ti-plus"></i> הוסף שדה</button></div>
    <div class="section-divider"><i class="ti ti-shield-check"></i> שדות ניהוליים (מנהל ממלא)</div>
    <div class="form-row"><div id="admin-field-list">${adminRows}</div><button class="btn btn-sm btn-purple mt-1" type="button" onclick="addField('a')"><i class="ti ti-plus"></i> הוסף שדה ניהולי</button></div>
    <div id="pending-rules-section">${pendingHTML}</div>
    <div class="modal-footer"><button class="btn" onclick="closeModal()">ביטול</button>${saveBtn}</div>`;
}
function fieldRowHTML(ef,i,p){
  const typeOpts=['text','number','select','checkbox'].map(t=>`<option value="${t}" ${ef.type===t?'selected':''}>${t==='text'?'טקסט':t==='number'?'מספר':t==='select'?'תפריט':'תיבת סימון'}</option>`).join('');
  return `<div class="field-row" style="grid-template-columns:1fr 1fr auto auto"><div><label class="form-label" style="font-size:10px">שם השדה</label><input class="form-input" data-fl="${p}_${i}" value="${esc(ef.label)}" placeholder="שם"></div>
    <div><label class="form-label" style="font-size:10px">סוג</label>
      <select class="form-input" data-ft="${p}_${i}" onchange="onTypeChange('${p}',${i},this.value)"><option value="">בחר...</option>${typeOpts}</select>
      ${ef.type==='select'?`<input class="form-input mt-1" data-fo="${p}_${i}" value="${esc(ef.options||'')}" placeholder="אפ1,אפ2,אפ3">`:''}
    </div>
    <div style="padding-top:20px;text-align:center">
      <label class="form-label" style="font-size:10px;margin-bottom:6px;display:block">חובה</label>
      <input type="checkbox" data-fr="${p}_${i}" ${ef.required?'checked':''} style="width:17px;height:17px;accent-color:var(--red);cursor:pointer" title="שדה חובה">
    </div>
    <div style="padding-top:38px"><button class="btn btn-xs btn-danger" type="button" onclick="removeField('${p}',${i})"><i class="ti ti-trash"></i></button></div>
  </div>`;
}
function pickIcon(ic){_tmpIcon=ic;document.querySelectorAll('.icon-opt').forEach(el=>el.classList.toggle('selected',el.dataset.icon===ic));}
function onTypeChange(p,i,val){const arr=p==='f'?_tmpFields:_tmpAdminFields;arr[i].type=val;if(val!=='select')arr[i].options='';refreshFields(p);}
function refreshFields(p){
  const arr=p==='f'?_tmpFields:_tmpAdminFields;
  const el=document.getElementById(p==='f'?'field-list':'admin-field-list');
  if(el)el.innerHTML=arr.map((ef,i)=>fieldRowHTML(ef,i,p)).join('');
  if(p==='a')refreshPendingRules();
}
function refreshPendingRules(){
  const sec=document.getElementById('pending-rules-section');if(!sec)return;
  const fields=_tmpAdminFields.filter(af=>af.label);if(!fields.length){sec.innerHTML='';return;}
  const cur={};document.querySelectorAll('[data-pr]').forEach(el=>{if(el.value)cur[el.dataset.pr]=el.value;});
  sec.innerHTML=`<div class="section-divider" style="color:#b45309"><i class="ti ti-bell"></i> הגדרת סטטוס "ממתין"</div>
    ${fields.map(af=>{const rule=cur[af.id]||'ignore';let opts=`<option value="ignore" ${rule==='ignore'?'selected':''}>התעלם</option><option value="must_fill" ${rule==='must_fill'?'selected':''}>חייב מלא</option>`;if(af.type==='checkbox')opts+=`<option value="must_check" ${rule==='must_check'?'selected':''}>חייב מסומן</option>`;if(af.type==='select'&&af.options)af.options.split(',').forEach(o=>{const v='value:'+o.trim();opts+=`<option value="${esc(v)}" ${rule===v?'selected':''}>${esc(o.trim())}</option>`;});
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-xs);padding:10px"><div style="font-size:13px;font-weight:600;color:var(--purple)"><i class="ti ti-shield-check"></i> ${esc(af.label)}</div><select class="form-input" style="font-size:13px;padding:6px 10px" data-pr="${af.id}">${opts}</select></div>`;
  }).join('')}`;
}
function addField(p){const arr=p==='f'?_tmpFields:_tmpAdminFields;arr.push({id:genId(),label:'',type:'text',options:''});refreshFields(p);}
function removeField(p,i){const arr=p==='f'?_tmpFields:_tmpAdminFields;arr.splice(i,1);refreshFields(p);}
function collectFields(p){const arr=p==='f'?_tmpFields:_tmpAdminFields;return arr.map((ef,i)=>{const l=document.querySelector(`[data-fl="${p}_${i}"]`),t=document.querySelector(`[data-ft="${p}_${i}"]`),o=document.querySelector(`[data-fo="${p}_${i}"]`),r=document.querySelector(`[data-fr="${p}_${i}"]`);return{id:ef.id,label:l?l.value.trim():ef.label,type:t?t.value:ef.type,options:o?o.value.trim():ef.options,required:r?r.checked:!!ef.required};}).filter(ef=>ef.label);}
function collectPendingRules(){const r={};document.querySelectorAll('[data-pr]').forEach(el=>{if(el.value&&el.value!=='ignore')r[el.dataset.pr]=el.value;});return r;}
async function saveNewFile(){const name=document.getElementById('mf-name').value.trim(),orgId=document.getElementById('mf-org').value;if(!name){alert('יש להזין שם');return;}if(!orgId){alert('יש לבחור ארגון');return;}await POST('files',{name,icon:_tmpIcon,org_id:orgId,extra_fields:collectFields('f'),admin_fields:collectFields('a'),pending_rules:collectPendingRules()});await loadAll();await loadPendingCounts();closeModal();render();showAlert('הקובץ נוסף','success');}
async function saveEditFile(id){const name=document.getElementById('mf-name').value.trim(),orgId=document.getElementById('mf-org').value;if(!name){alert('יש להזין שם');return;}if(!orgId){alert('יש לבחור ארגון');return;}await PATCH('files',{name,icon:_tmpIcon,org_id:orgId,extra_fields:collectFields('f'),admin_fields:collectFields('a'),pending_rules:collectPendingRules()},`?id=eq.${id}`);await loadAll();await loadPendingCounts();closeModal();render();showAlert('הקובץ עודכן','success');}
async function confirmDeleteFile(id){const f=DB.files.find(x=>x.id===id);if(!confirm(`למחוק את "${f.name}"?`))return;await DEL('files',`?id=eq.${id}`);await loadAll();render();showAlert('הקובץ נמחק','success');}

// ── EXPORT ──
async function exportFile(fileId){
  const f=DB.files.find(x=>x.id===fileId);showAlert('מכין קובץ Excel...','success');
  const records=await GET('records',`?file_id=eq.${fileId}&order=created_at.desc`);
  const extra=f.extra_fields||[],admin=f.admin_fields||[];
  const headers=['תאריך','שם פרטי','שם משפחה','טלפון','ת"ז','נציג',...extra.map(ef=>ef.label),...admin.map(af=>'[ניהולי] '+af.label)];
  const rows=records.map(r=>[fmtDate(r.created_at),r.first_name,r.last_name,r.phone,r.id_num,r.agent_name||'',...extra.map(ef=>(r.extra||{})[ef.id]||''),...admin.map(af=>{const v=(r.admin_data||{})[af.id];return af.type==='checkbox'?(v?'כן':'לא'):(v||'');})]);
  buildXLSX(f.name,headers,rows,admin.map((_,i)=>6+extra.length+i));
}
async function exportAll(){
  showAlert('מכין קובץ Excel...','success');
  const headers=['ארגון','קובץ','תאריך','שם פרטי','שם משפחה','טלפון','ת"ז','נציג'];
  const rows=_allRecords.map(r=>{const f=DB.files.find(x=>x.id===r.file_id),o=DB.orgs.find(x=>x.id===(f&&f.org_id));return[o?o.name:'',f?f.name:'',fmtDate(r.created_at),r.first_name,r.last_name,r.phone,r.id_num,r.agent_name||''];});
  buildXLSX('כל_הרשומות',headers,rows,[]);
}
function buildXLSX(filename,headers,rows,adminColIdxs){
  const wb=XLSX.utils.book_new();
  const wsData=[headers,...rows];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=headers.map((h,ci)=>({wch:Math.min(Math.max(Math.max(h.length,...rows.map(r=>(r[ci]||'').toString().length))+2,10),40)}));
  headers.forEach((_,ci)=>{const ref=XLSX.utils.encode_cell({r:0,c:ci});if(!ws[ref])return;ws[ref].s={fill:{fgColor:{rgb:'111827'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:11},alignment:{horizontal:'right',vertical:'center'}};});
  adminColIdxs.forEach(ci=>{const ref=XLSX.utils.encode_cell({r:0,c:ci});if(!ws[ref])return;ws[ref].s={fill:{fgColor:{rgb:'7C3AED'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:11},alignment:{horizontal:'right',vertical:'center'}};for(let ri=1;ri<wsData.length;ri++){const dr=XLSX.utils.encode_cell({r:ri,c:ci});if(ws[dr])ws[dr].s={fill:{fgColor:{rgb:'F5F3FF'}},alignment:{horizontal:'right'}};}});
  ws['!freeze']={xSplit:0,ySplit:1,topLeftCell:'A2',activePane:'bottomLeft',state:'frozen'};
  XLSX.utils.book_append_sheet(wb,ws,'רשומות');
  XLSX.writeFile(wb,filename+'.xlsx');
}

// ── HELPERS ──
function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').style.display='flex';}
function closeModal(){if(_modalLocked)return;document.getElementById('modal-overlay').style.display='none';}
function showAlert(msg,type='success'){S.alert={msg,type};render();setTimeout(()=>{S.alert=null;render();},3500);}
function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){return new Date(ts).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function genId(){return Math.random().toString(36).slice(2,9);}

// ══ ANIMATED BACKGROUND ══
function initLoginBg(){
  const canvas=document.getElementById('login-bg-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let W,H,nodes,edges,tick=0;
  const FILE_ICONS=['📁','📄','📊','📋','📑','🗂️','📂'];
  const COLORS=['#2563eb','#7c3aed','#06b6d4','#3b82f6','#8b5cf6','#0ea5e9'];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    buildGraph();
  }

  function buildGraph(){
    const count=Math.max(18,Math.floor((W*H)/28000));
    nodes=Array.from({length:count},(_,i)=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*0.35, vy:(Math.random()-.5)*0.35,
      r:Math.random()*3+2,
      color:COLORS[i%COLORS.length],
      icon:Math.random()<0.3?FILE_ICONS[Math.floor(Math.random()*FILE_ICONS.length)]:null,
      iconSize:Math.random()*10+14,
      pulse:Math.random()*Math.PI*2,
      alpha:Math.random()*.5+.3,
    }));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    tick++;

    // subtle gradient overlay
    const grad=ctx.createRadialGradient(W*.5,H*.4,.1,W*.5,H*.4,Math.max(W,H)*.75);
    grad.addColorStop(0,'rgba(15,30,80,.0)');
    grad.addColorStop(1,'rgba(5,8,20,.35)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // edges
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160){
          const alpha=(1-dist/160)*0.18;
          const grad2=ctx.createLinearGradient(nodes[i].x,nodes[i].y,nodes[j].x,nodes[j].y);
          grad2.addColorStop(0,nodes[i].color.replace(')',`,${alpha})`).replace('rgb','rgba').replace('#',''));
          // simple fallback
          ctx.beginPath();
          ctx.moveTo(nodes[i].x,nodes[i].y);
          ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(120,160,255,${alpha*1.8})`;
          ctx.lineWidth=.8;
          ctx.stroke();

          // moving dot along edge
          if(Math.random()<0.001){
            const t=(tick*.01)%1;
            const mx=nodes[i].x+(nodes[j].x-nodes[i].x)*t;
            const my=nodes[i].y+(nodes[j].y-nodes[i].y)*t;
            ctx.beginPath();
            ctx.arc(mx,my,1.5,0,Math.PI*2);
            ctx.fillStyle=`rgba(150,180,255,0.6)`;
            ctx.fill();
          }
        }
      }
    }

    // nodes
    nodes.forEach((n,i)=>{
      n.pulse+=0.02;
      const pulsed=n.r+Math.sin(n.pulse)*1.2;
      // glow
      const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,pulsed*6);
      glow.addColorStop(0,n.color+'55');
      glow.addColorStop(1,n.color+'00');
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulsed*6,0,Math.PI*2);
      ctx.fillStyle=glow;
      ctx.fill();
      // dot
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulsed,0,Math.PI*2);
      ctx.fillStyle=n.color+'cc';
      ctx.fill();
      // icon
      if(n.icon){
        ctx.font=`${n.iconSize}px serif`;
        ctx.globalAlpha=n.alpha*(0.7+Math.sin(n.pulse)*.15);
        ctx.fillText(n.icon,n.x-n.iconSize*.5,n.y-pulsed-6);
        ctx.globalAlpha=1;
      }
      // move
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-30) n.x=W+30;
      if(n.x>W+30) n.x=-30;
      if(n.y<-30) n.y=H+30;
      if(n.y>H+30) n.y=-30;
    });

    // "movement" watermark text
    ctx.save();
    ctx.font='900 clamp(40px,8vw,100px) Arial Black,Arial,sans-serif';
    ctx.fillStyle='rgba(37,99,235,0.06)';
    ctx.textAlign='center';
    ctx.fillText('movement»',W*.5,H*.55);
    ctx.restore();

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize();
  draw();
}

async function initApp(){await loadAll();await loadPendingCounts();render();}
window.addEventListener('DOMContentLoaded',()=>{initLoginBg();initLogin();});
