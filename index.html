let _dailyReportTimer=null;
function startDailyReportTimer(){
  clearInterval(_dailyReportTimer);
  const cfg=loadDailyReportConfig();
  if(!cfg.enabled||!cfg.phone) return;

  _dailyReportTimer=setInterval(async()=>{
    const now=new Date();
    const day=now.getDay();
    const hour=now.getHours();

    // תמיד חוסם שישי/שבת
    if(day===5||day===6) return;
    // only blocked days from config
    if((cfg.blockedDays||[]).includes(day)) return;

    // only between startHour and 18:00
    const startHour=cfg.hour||8;
    if(hour < startHour || hour >= 18) return;

    // check if already sent in this interval window
    const intervalHours=cfg.intervalHours||24;
    const windowKey=Math.floor((now.getTime() - new Date(now.toDateString()).getTime()) / (intervalHours*3600000));
    const key=now.toISOString().slice(0,10)+'_'+windowKey;
    const lastSent=localStorage.getItem('moked_daily_report_last');
    if(lastSent===key) return;

    await sendDailyReportNow(true);
    localStorage.setItem('moked_daily_report_last', key);
  }, 10*60*1000); // check every 10 min
}

async function sendDailyReportNow(silent=false){
  const cfg=loadDailyReportConfig();
  const phone=cfg.phone?.trim();
  if(!phone){ if(!silent) showAlert('יש להזין טלפון','error'); return; }

  const fileIds=cfg.files||[];
  const filesToCheck=fileIds.length>0
    ? DB.files.filter(f=>fileIds.includes(f.id))
    : DB.files;

  if(!filesToCheck.length){ if(!silent) showAlert('אין קבצים נבחרים','error'); return; }

  const lines=[];
  await Promise.all(filesToCheck.map(async f=>{
    if(!f.alert_rule?.enabled||!f.alert_rule?.fieldId) return;
    try{
      const recs=await GET('records',`?file_id=eq.${f.id}&select=id,created_at,extra,admin_data`);
      const breached=recs.filter(r=>recordMatchesAlert(r,f)).length;
      if(breached>0){
        const contacts=(f.wa_contacts||[]).map(c=>c.name).filter(Boolean);
        const org=DB.orgs.find(x=>x.id===f.org_id);
        lines.push({name:f.name, org:org?.name||'', breached, contacts});
      }
    }catch(e){}
  }));

  if(!lines.length){
    if(!silent) showAlert('אין חריגות כרגע — לא נשלח דוח','success');
    return;
  }

  lines.sort((a,b)=>b.breached-a.breached);
  const now=new Date();
  const timeStr=now.toLocaleDateString('he-IL')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const totalBreached=lines.reduce((s,l)=>s+l.breached,0);

  const dateStr=now.toLocaleDateString('he-IL');
  const fileLines=lines.map(l=>`${l.name}: ${l.breached} פניות ממתינות לטיפול`).join('\n');
  const msg=`מובמנט | ${dateStr}\n\n${fileLines}\n\nלכניסה: https://movement-moked.github.io`;

  try{
    await sendWA(formatWAPhone(phone), msg);
    if(!silent) showAlert(`✓ דוח יומי נשלח`,'success');
  }catch(e){
    if(!silent) showAlert('שגיאה בשליחה: '+e.message,'error');
  }
}

async function buildWeeklyData(){
  // get last 5 working days (Sun-Thu)
  const days=[];
  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי'];
  let d=new Date();
  while(days.length<5){
    const day=d.getDay();
    if(day>=0&&day<=4) days.unshift({date:new Date(d),name:dayNames[day],key:d.toISOString().slice(0,10)});
    d.setDate(d.getDate()-1);
  }

  // files with SLA + responsible manager
  const filesWithSLA=DB.files.filter(f=>f.alert_rule?.enabled&&f.alert_rule?.fieldId);

  // load breaches per file per day
  const breachData={}; // fileId -> dayKey -> count
  await Promise.all(filesWithSLA.map(async f=>{
    breachData[f.id]={};
    await Promise.all(days.map(async day=>{
      try{
        const from=day.key+'T00:00:00.000Z';
        const to=day.key+'T23:59:59.999Z';
        // count records created that day
        const recs=await GET('records',`?file_id=eq.${f.id}&created_at=gte.${encodeURIComponent(from)}&created_at=lte.${encodeURIComponent(to)}&select=id,created_at,extra,admin_data`);
        const breached=recs.filter(r=>recordMatchesAlert(r,f)).length;
        breachData[f.id][day.key]=breached;
      }catch(e){ breachData[f.id][day.key]=0; }
    }));
  }));

  // group by responsible manager
  const managers={};
  for(const f of filesWithSLA){
    const mgrEmail=f.responsible_manager||'__none__';
    if(!managers[mgrEmail]) managers[mgrEmail]={files:[]};
    // only include file if had ANY breach this week
    const hadBreaches=days.some(day=>(breachData[f.id]||{})[day.key]>0);
    if(hadBreaches) managers[mgrEmail].files.push(f);
  }

  _weeklyData={days, managers, breachData, filesWithSLA};
}

  if(S._weeklyLoading) return `<div class="loading"><div class="spinner"></div><p>מחשב דוח שבועי...</p></div>`;
  if(!_weeklyData) return `<div class="empty"><i class="ti ti-calendar-week"></i><p>לחץ רענן לטעינת הדוח</p></div>`;

function defaultWAPolicy(){
  return {
    enabled: true,
    intervalHours: 2,        // כל כמה שעות לבדוק
    startHour: 8,            // מ-08:00
    endHour: 20,             // עד 20:00
    blockedDays: [5,6],      // 5=שישי, 6=שבת
    onlyNewBreaches: false,  // לשלוח רק על חריגות חדשות
  };
}

async function saveWAPolicy(){
  const p = collectWAPolicy();
  localStorage.setItem('moked_wa_policy', JSON.stringify(p));
  _waPolicy = p;
  // sync to Supabase so Edge Function respects it
  try{
    await PATCH('app_settings', {value: JSON.stringify(p.enabled)}, `?key=eq.wa_enabled`);
  }catch(e){
    // if row doesn't exist yet, insert it
    try{ await POST('app_settings', {key:'wa_enabled', value: JSON.stringify(p.enabled)}); }catch(e2){}
  }
  startWAAutoCheckWithPolicy();
  showAlert(p.enabled ? '✅ התראות WA פעילות' : '⏸ התראות WA מושהות', 'success');
}

function collectWAPolicy(){
  return {
    enabled: document.getElementById('wap-enabled')?.value === 'true',
    intervalHours: parseFloat(document.getElementById('wap-interval')?.value||2),
    startHour: parseInt(document.getElementById('wap-start')?.value||8),
    endHour: parseInt(document.getElementById('wap-end')?.value||20),
    // convert active days to blocked days
    blockedDays: [0,1,2,3,4,5,6].filter(i=>{
      const cb=document.querySelector(`[data-waday="${i}"]`);
      return cb && !cb.checked; // not checked = blocked
    }),
    onlyNewBreaches: document.getElementById('wap-new-only')?.checked ?? false,
  };
}

function isWASendAllowed(policy){
  if(!policy?.enabled) return false;
  const now = new Date();
  const day = now.getDay();
  // תמיד חוסם שישי/שבת — ללא קשר להגדרות
  if(day===5||day===6) return false;
  if((policy.blockedDays||[]).includes(day)) return false;
  const hour = now.getHours();
  if(hour < policy.startHour || hour >= policy.endHour) return false;
  return true;
}

function addWAHistory(entries){
  _waHistory = [...entries, ..._waHistory].slice(0,100); // keep last 100
  localStorage.setItem('moked_wa_history', JSON.stringify(_waHistory));
}

// Override checkAndSendWAAlerts to respect policy and log history
const _origCheckAndSend = checkAndSendWAAlerts;
async function checkAndSendWAAlerts(silent=false){
  const policy = _waPolicy || defaultWAPolicy();
  // ALWAYS check day/time — even in silent mode
  if(!isWASendAllowed(policy)){
    if(!silent){
      const now=new Date();
      const day=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'][now.getDay()];
      showAlert(`לא ניתן לשלוח כעת — ${day} ${now.getHours()}:00 מחוץ לחלון ההתראות`,'error');
    }
    return; // block both silent and non-silent
  }

  const filesWithAlerts=DB.files.filter(f=>canManagerAccessFile(f)&&f.alert_rule?.enabled&&f.alert_rule?.fieldId&&(f.wa_contacts||[]).length>0);
  if(!filesWithAlerts.length){if(!silent)showAlert('אין קבצים עם התראות WA מוגדרות','error');return;}

  let totalSent=0,totalBreached=0;const msgs=[];const historyEntries=[];

  await Promise.all(filesWithAlerts.map(async f=>{
    try{
      const recs=await GET('records',`?file_id=eq.${f.id}&select=id,created_at,extra,admin_data`);
      const breached=recs.filter(r=>recordMatchesAlert(r,f));
      if(!breached.length) return;
      totalBreached+=breached.length;
      const org=DB.orgs.find(x=>x.id===f.org_id);
      const rule=f.alert_rule||{};
      const allFields=[...(f.extra_fields||[]),...(f.admin_fields||[])];
      const fieldLabel=(allFields.find(x=>x.id===rule.fieldId)||{}).label||rule.fieldId;
      const dateStr=new Date().toLocaleDateString('he-IL');
      const msg=`מובמנט | ${dateStr}\n\n${f.name}: ${breached.length} פניות ממתינות לטיפול\n\nלכניסה: https://movement-moked.github.io`;
      for(const contact of (f.wa_contacts||[])){
        const phone=formatWAPhone(contact.phone);
        let success=true;
        try{ await sendWA(phone,msg); }catch(e){ success=false; }
        totalSent++; msgs.push(`${contact.name} (${f.name})`);
        historyEntries.push({ts:new Date().toISOString(),fileName:f.name,contactName:contact.name,phone,breached:breached.length,success});
      }
      // שליחה לקבוצה
      try{
        await fetch(WA_API,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({phone:'120363429161263528@g.us',message:msg,source:'מערכת קבצים'})});
        historyEntries.push({ts:new Date().toISOString(),fileName:f.name,contactName:'קבוצה',phone:'120363429161263528@g.us',breached:breached.length,success:true});
      }catch(e){}
    }catch(e){}
  }));

  if(historyEntries.length) addWAHistory(historyEntries);
  if(!silent){
    if(totalSent>0) showAlert(`✓ נשלחו ${totalSent} הודעות WA על ${totalBreached} חריגות`,'success');
    else showAlert('אין חריגות כרגע','success');
  }
}

function startWAAutoCheckWithPolicy(){
  clearInterval(_waAutoTimer);
  const policy = _waPolicy || defaultWAPolicy();
  if(!policy.enabled) return;
  const intervalMs = (policy.intervalHours||2)*60*60*1000;
  _waAutoTimer=setInterval(()=>{
    if(!S.adminLoggedIn) return;
    // הגנה כפולה — לעולם לא שולח בשישי/שבת
    const now=new Date();
    const day=now.getDay();
    if(day===5||day===6) return; // שישי/שבת — עצירה מוחלטת
    checkAndSendWAAlerts(true);
  }, intervalMs);
}

async function saveAdminField(recordId,fieldId,value,fileId){
  const recs=_cachedRecords[fileId]||[];
  const record=recs.find(r=>r.id===recordId);if(!record)return;
  const f=DB.files.find(x=>x.id===fileId);
  const af=(f?.admin_fields||[]).find(x=>x.id===fieldId);
  const oldVal=(record.admin_data||{})[fieldId];
  if(!record.admin_data)record.admin_data={};
  record.admin_data[fieldId]=value;
  const treatedAt=new Date().toISOString();
  record.treated_at=treatedAt;
  // build change log entry
  if(!record.change_log) record.change_log=[];
  record.change_log.push({
    ts: treatedAt,
    by: currentUser?.name||_agentName||'מנהל',
    field: af?af.label:fieldId,
    from: oldVal===undefined||oldVal===null||oldVal===''?'—':(oldVal===true?'מסומן':oldVal===false?'לא מסומן':String(oldVal)),
    to: value===true?'מסומן':value===false?'לא מסומן':String(value)
  });
  // keep only last 30 entries per record
  if(record.change_log.length>30) record.change_log=record.change_log.slice(-30);
  try{
    await PATCH('records',{admin_data:record.admin_data,treated_at:treatedAt,change_log:record.change_log},`?id=eq.${recordId}`);
    await loadAllCounts();
    const cell=document.getElementById('treated-at-'+recordId);
    if(cell) cell.innerHTML=`<div>${fmtDate(treatedAt)}</div><div style="color:var(--purple);font-weight:600;font-size:10px">${esc(currentUser?.name||_agentName||'')}</div>`;
  }
  catch(e){showAlert('שגיאה בשמירה','error');}
}

async function archiveNow(recordId, fileId){
  if(!confirm('להעביר לארכיון עכשיו?')) return;
  const now=new Date().toISOString();
  try{
    await PATCH('records',{archived:true,archived_at:now},`?id=eq.${recordId}`);
    if(_cachedRecords[fileId]) _cachedRecords[fileId]=_cachedRecords[fileId].filter(r=>r.id!==recordId);
    await loadAllCounts();
    render();
    showAlert('הרשומה הועברה לארכיון','success');
  }catch(e){showAlert('שגיאה','error');}
}

async function autoArchiveExpired(fileId){
  // Auto-archive records where manager filled an admin field (treated_at set) more than 30 days ago
  const recs=_cachedRecords[fileId]||[];
  const thirtyDaysAgo=new Date(Date.now()-30*24*3600000).toISOString();
  const toArchive=recs.filter(r=>r.treated_at&&r.treated_at<thirtyDaysAgo&&!r.archived);
  if(!toArchive.length) return;
  const now=new Date().toISOString();
  await Promise.all(toArchive.map(r=>PATCH('records',{archived:true,archived_at:now},`?id=eq.${r.id}`)));
  _cachedRecords[fileId]=recs.filter(r=>!toArchive.find(a=>a.id===r.id));
  if(toArchive.length) render(); // refresh to show updated count
}

function daysUntilArchive(approvedAt){
  if(!approvedAt) return null;
  const diff=30-Math.floor((Date.now()-new Date(approvedAt).getTime())/86400000);
  return Math.max(0,diff);
}

let _importData = [];

function previewImport(){
  const file = document.getElementById('import-excel-file').files[0];
  if(!file) return;
  const preview = document.getElementById('import-preview');
  preview.innerHTML = '<div class="loading"><div class="spinner"></div><p>קורא קובץ...</p></div>';

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

      _importData = [];
      const errors = [];

      rows.forEach((row, i)=>{
        if(!row[0] && !row[1]) return; // skip empty
        const name = (row[0]||'').toString().trim();
        const idNum = (row[1]||'').toString().replace(/\D/g,'').trim();
        if(!name){ errors.push(`שורה ${i+1}: חסר שם`); return; }
        if(idNum.length < 4){ errors.push(`שורה ${i+1}: ת"ז קצרה מדי (${idNum})`); return; }
        const pin = idNum.slice(-4);
        _importData.push({name, pin, idNum});
      });

      if(!_importData.length && !errors.length){
        preview.innerHTML = '<div class="alert alert-error"><i class="ti ti-alert-circle"></i> הקובץ ריק</div>';
        return;
      }

      // check duplicates with existing
      const existingNames = allAgents.map(u=>u.name.trim());
      const newAgents = _importData.filter(d=>!existingNames.includes(d.name));
      const dupes = _importData.filter(d=>existingNames.includes(d.name));

      let html = '';
      if(errors.length){
        html += `<div class="alert alert-error" style="margin-bottom:10px"><i class="ti ti-alert-circle"></i> ${errors.length} שגיאות: ${errors.join(' | ')}</div>`;
      }
      html += `<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px">
        תצוגה מקדימה — ${newAgents.length} נציגים חדשים לייבוא:
        ${dupes.length ? `<span style="color:var(--amber);margin-right:8px">(${dupes.length} כבר קיימים — יידלגו)</span>` : ''}
      </div>`;

      if(newAgents.length){
        html += `<div class="table-wrap" style="max-height:220px;overflow-y:auto">
          <table><thead><tr><th>#</th><th>שם נציג</th><th>ת"ז</th><th>PIN</th></tr></thead><tbody>
          ${newAgents.map((d,i)=>`<tr>
            <td style="color:var(--text3)">${i+1}</td>
            <td><div style="display:flex;align-items:center;gap:8px">
              <div class="ali-avatar" style="width:26px;height:26px;font-size:9px">${d.name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase()}</div>
              ${esc(d.name)}
            </div></td>
            <td dir="ltr" style="color:var(--text3)">${esc(d.idNum)}</td>
            <td dir="ltr"><span style="letter-spacing:4px;font-weight:700">••••</span> <span style="color:var(--text3);font-size:11px">(${esc(d.pin)})</span></td>
          </tr>`).join('')}
          </tbody></table>
        </div>`;
        document.getElementById('import-confirm-btn').style.display = '';
        document.getElementById('import-confirm-btn').textContent = '';
        document.getElementById('import-confirm-btn').innerHTML = `<i class="ti ti-check"></i> ייבא ${newAgents.length} נציגים`;
        // store only new
        _importData = newAgents;
      } else {
        html += `<div class="alert alert-error"><i class="ti ti-alert-circle"></i> כל הנציגים כבר קיימים במערכת</div>`;
        document.getElementById('import-confirm-btn').style.display = 'none';
      }
      preview.innerHTML = html;
    } catch(err){
      preview.innerHTML = `<div class="alert alert-error"><i class="ti ti-alert-circle"></i> שגיאה בקריאת הקובץ: ${esc(err.message)}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

async function openFilePermissions(fileId){
  const f=DB.files.find(x=>x.id===fileId); if(!f) return;
  // load all managers
  let managers=[];
  try{ managers=await GET('app_managers','?select=email,name,active&order=name.asc'); }catch(e){}
  const allowed=f.allowed_managers||[];

  const rows=managers.filter(m=>m.active).map(m=>`
    <label style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid ${allowed.includes(m.email)?'var(--blue)':'var(--border)'};border-radius:10px;cursor:pointer;background:${allowed.includes(m.email)?'var(--blue-light)':'var(--surface2)'};transition:all .15s;margin-bottom:6px">
      <input type="checkbox" value="${esc(m.email)}" ${allowed.includes(m.email)?'checked':''} onchange="togglePermission(this)" style="width:18px;height:18px;accent-color:var(--blue);cursor:pointer;flex-shrink:0">
      <div>
        <div style="font-weight:700;font-size:14px">${esc(m.name||m.email)}</div>
        <div style="font-size:11px;color:var(--text3)" dir="ltr">${esc(m.email)}</div>
      </div>
    </label>`).join('');

  showModal(`

    <div style="font-size:13px;color:var(--text2);margin-bottom:14px;padding:10px 12px;background:var(--amber-light);border-radius:8px;border:1px solid #fcd34d">
      <i class="ti ti-info-circle" style="color:#92400e"></i>
      אם לא נבחר אף מנהל — <strong>כולם</strong> יכולים לגשת לקובץ זה
    </div>
    <div id="perm-list" data-file-id="${fileId}">${rows||'<div class="empty"><i class="ti ti-users"></i><p>אין מנהלים פעילים</p></div>'}</div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ביטול</button>
      <button class="btn btn-black" onclick="saveFilePermissions('${fileId}')"><i class="ti ti-check"></i> שמור הרשאות</button>
    </div>`);
}

function togglePermission(cb){
  const label=cb.closest('label');
  label.style.borderColor=cb.checked?'var(--blue)':'var(--border)';
  label.style.background=cb.checked?'var(--blue-light)':'var(--surface2)';
}

async function saveFilePermissions(fileId){
  const checked=[...document.querySelectorAll('#perm-list input[type=checkbox]:checked')].map(el=>el.value);
  try{
    await PATCH('files',{allowed_managers:checked},`?id=eq.${fileId}`);
    const f=DB.files.find(x=>x.id===fileId);
    if(f) f.allowed_managers=checked;
    closeModal();
    render();
    showAlert(checked.length?`✓ גישה הוגבלת ל-${checked.length} מנהלים`:'✓ כל המנהלים יכולים לגשת','success');
  }catch(e){ showAlert('שגיאה בשמירה','error'); }
}

// Filter files by manager permissions
function canManagerAccessFile(file){
  if(currentUser?.is_super_admin) return true; // אדיר רואה הכל
  const allowed=file.allowed_managers||[];
  if(!allowed.length) return true; // אין הגבלה
  return allowed.includes(currentUser?.email||'');
}

function buildAlertRuleHTML(f){
  const rule = f.alert_rule||{};
  const allFields = [...(f.extra_fields||[]),...(f.admin_fields||[])];
  if(!allFields.length) return `<div style="font-size:13px;color:var(--text3)">יש להגדיר שדות תחילה</div>`;

  const fieldOpts = allFields.map(fld=>`<option value="${fld.id}" ${rule.fieldId===fld.id?'selected':''}>${esc(fld.label)}</option>`).join('');
  const selField = allFields.find(fld=>fld.id===rule.fieldId);

  let condOpts = `<option value="empty" ${rule.condition==='empty'?'selected':''}>ריק / לא מולא</option>`;
  if(selField?.type==='select'){
    condOpts += `<option value="not_value" ${rule.condition==='not_value'?'selected':''}>שונה מ...</option>`;
    condOpts += `<option value="value" ${rule.condition==='value'?'selected':''}>שווה ל...</option>`;
  } else if(selField?.type==='checkbox'){
    condOpts += `<option value="not_value" ${rule.condition==='not_value'?'selected':''}>לא מסומן</option>`;
    condOpts += `<option value="value" ${rule.condition==='value'?'selected':''}>מסומן</option>`;
  } else {
    condOpts += `<option value="not_value" ${rule.condition==='not_value'?'selected':''}>שונה מ...</option>`;
  }

  let valueInput = '';
  if(rule.condition==='not_value'||rule.condition==='value'){
    if(selField?.type==='select'){
      const vopts=(selField.options||'').split(',').map(o=>`<option value="${esc(o.trim())}" ${rule.value===o.trim()?'selected':''}>${esc(o.trim())}</option>`).join('');
      valueInput=`<select class="form-input" id="ar-value" style="font-size:13px;padding:6px 10px"><option value="">בחר...</option>${vopts}</select>`;
    } else {
      valueInput=`<input class="form-input" id="ar-value" value="${esc(rule.value||'')}" placeholder="הזן ערך..." style="font-size:13px;padding:6px 10px">`;
    }
  }

  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;font-weight:600">
          <input type="checkbox" id="ar-enabled" ${rule.enabled?'checked':''} style="width:16px;height:16px;accent-color:#c2410c">
          הפעל התראה לקובץ זה
        </label>
      </div>
      <div id="ar-body" style="${rule.enabled?'':'opacity:.4;pointer-events:none'}">
        <div style="display:grid;grid-template-columns:auto 1fr auto 1fr;gap:10px;align-items:center;margin-bottom:10px">
          <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">אם עברו יותר מ</span>
          <input class="form-input" id="ar-days" type="number" min="0" value="${rule.days||''}" placeholder="ימים (0 = תמיד)" style="font-size:13px;padding:6px 10px">
          <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">ימים מהזנה</span>
          <div></div>
        </div>
        <div style="display:grid;grid-template-columns:auto 1fr auto 1fr;gap:10px;align-items:center">
          <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">ושדה</span>
          <select class="form-input" id="ar-field" style="font-size:13px;padding:6px 10px" onchange="refreshAlertModal()">
            <option value="">בחר שדה...</option>${fieldOpts}
          </select>
          <span style="font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap">הוא</span>
          <div style="display:flex;gap:8px">
            <select class="form-input" id="ar-condition" style="font-size:13px;padding:6px 10px" onchange="refreshAlertModal()">
              ${condOpts}
            </select>
            ${valueInput?`<div id="ar-value-wrap">${valueInput}</div>`:''}
          </div>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text3)">
          <i class="ti ti-info-circle"></i> השאר ימים ריק או 0 לבדיקה ללא תנאי זמן
        </div>
      </div>
    </div>`;
}

function refreshAlertModal(){
  // re-render just the alert section without closing modal
  const f = _editingFile || {extra_fields:_tmpFields,admin_fields:_tmpAdminFields,alert_rule:collectAlertRule()};
  const sec = document.getElementById('alert-rule-section');
  if(sec) sec.innerHTML = buildAlertRuleHTML(f);
  // toggle enabled
  const cb = document.getElementById('ar-enabled');
  const body = document.getElementById('ar-body');
  if(cb&&body){
    cb.addEventListener('change',()=>{ body.style.opacity=cb.checked?'1':'0.4'; body.style.pointerEvents=cb.checked?'':'none'; });
  }
}

function collectAlertRule(){
  const enabled = document.getElementById('ar-enabled')?.checked||false;
  const days = document.getElementById('ar-days')?.value||'';
  const fieldId = document.getElementById('ar-field')?.value||'';
  const condition = document.getElementById('ar-condition')?.value||'empty';
  const valueEl = document.getElementById('ar-value');
  const value = valueEl?.value||'';
  return {enabled, days:days?parseFloat(days):0, fieldId, condition, value};
}

function fieldRowHTML(ef,i,p){
  const typeOpts=['text','number','select','checkbox','link'].map(t=>`<option value="${t}" ${ef.type===t?'selected':''}>${t==='text'?'טקסט':t==='number'?'מספר':t==='select'?'תפריט':t==='link'?'קישור (URL)':'תיבת סימון'}</option>`).join('');

function buildXLSX(filename,headers,rows,adminColIdxs){
  const wb=XLSX.utils.book_new();
  const wsData=[headers,...rows];
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols']=headers.map((h,ci)=>({wch:Math.min(Math.max(Math.max(h.length,...rows.map(r=>(r[ci]||'').toString().length))+2,10),40)}));
  headers.forEach((_,ci)=>{const ref=XLSX.utils.encode_cell({r:0,c:ci});if(!ws[ref])return;ws[ref].s={fill:{fgColor:{rgb:'111827'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:11},alignment:{horizontal:'right',vertical:'center'}};});
  adminColIdxs.forEach(ci=>{const ref=XLSX.utils.encode_cell({r:0,c:ci});if(!ws[ref])return;ws[ref].s={fill:{fgColor:{rgb:'7C3AED'}},font:{bold:true,color:{rgb:'FFFFFF'},sz:11},alignment:{horizontal:'right',vertical:'center'}};for(let ri=1;ri<wsData.length;ri++){const dr=XLSX.utils.encode_cell({r:ri,c:ci});if(ws[dr])ws[dr].s={fill:{fgColor:{rgb:'F5F3FF'}},alignment:{horizontal:'right'}};}});
  ws['!freeze']={xSplit:0,ySplit:1,topLeftCell:'A2',activePane:'bottomLeft',state:'frozen'};
  XLSX.utils.book_append_sheet(wb,ws,'רשומות');
  XLSX.writeFile(wb,filename+'.xlsx');
}

// ══ ANIMATED BACKGROUND ══
function initLoginBg(){
  const canvas=document.getElementById('login-bg-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  let W,H,nodes,edges,tick=0;
  const FILE_ICONS=['📁','📄','📊','📋','📑','🗂️','📂'];
  const COLORS=['#2563eb','#7c3aed','#06b6d4','#3b82f6','#8b5cf6','#0ea5e9'];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
    buildGraph();
  }

  function buildGraph(){
    const count=Math.max(18,Math.floor((W*H)/28000));
    nodes=Array.from({length:count},(_,i)=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*0.35, vy:(Math.random()-.5)*0.35,
      r:Math.random()*3+2,
      color:COLORS[i%COLORS.length],
      icon:Math.random()<0.3?FILE_ICONS[Math.floor(Math.random()*FILE_ICONS.length)]:null,
      iconSize:Math.random()*10+14,
      pulse:Math.random()*Math.PI*2,
      alpha:Math.random()*.5+.3,
    }));
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    tick++;

    // subtle gradient overlay
    const grad=ctx.createRadialGradient(W*.5,H*.4,.1,W*.5,H*.4,Math.max(W,H)*.75);
    grad.addColorStop(0,'rgba(15,30,80,.0)');
    grad.addColorStop(1,'rgba(5,8,20,.35)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // edges
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<160){
          const alpha=(1-dist/160)*0.18;
          const grad2=ctx.createLinearGradient(nodes[i].x,nodes[i].y,nodes[j].x,nodes[j].y);
          // skip grad2 per-node (use simple stroke instead)
          // simple fallback
          ctx.beginPath();
          ctx.moveTo(nodes[i].x,nodes[i].y);
          ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(120,160,255,${alpha*1.8})`;
          ctx.lineWidth=.8;
          ctx.stroke();

          // moving dot along edge
          if(Math.random()<0.001){
            const t=(tick*.01)%1;
            const mx=nodes[i].x+(nodes[j].x-nodes[i].x)*t;
            const my=nodes[i].y+(nodes[j].y-nodes[i].y)*t;
            ctx.beginPath();
            ctx.arc(mx,my,1.5,0,Math.PI*2);
            ctx.fillStyle=`rgba(150,180,255,0.6)`;
            ctx.fill();
          }
        }
      }
    }

    // nodes
    nodes.forEach((n,i)=>{
      n.pulse+=0.02;
      const pulsed=n.r+Math.sin(n.pulse)*1.2;
      // glow
      const glow=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,pulsed*6);
      glow.addColorStop(0,'rgba(37,99,235,0.3)');
      glow.addColorStop(1,'rgba(37,99,235,0)');
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulsed*6,0,Math.PI*2);
      ctx.fillStyle=glow;
      ctx.fill();
      // dot
      ctx.beginPath();
      ctx.arc(n.x,n.y,pulsed,0,Math.PI*2);
      ctx.fillStyle=n.color+'cc';
      ctx.fill();
      // icon
      if(n.icon){
        ctx.font=`${n.iconSize}px serif`;
        ctx.globalAlpha=n.alpha*(0.7+Math.sin(n.pulse)*.15);
        ctx.fillText(n.icon,n.x-n.iconSize*.5,n.y-pulsed-6);
        ctx.globalAlpha=1;
      }
      // move
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-30) n.x=W+30;
      if(n.x>W+30) n.x=-30;
      if(n.y<-30) n.y=H+30;
      if(n.y>H+30) n.y=-30;
    });

    // "movement" watermark text
    ctx.save();
    ctx.font='900 clamp(40px,8vw,100px) Arial Black,Arial,sans-serif';
    ctx.fillStyle='rgba(37,99,235,0.06)';
    ctx.textAlign='center';
    ctx.fillText('movement»',W*.5,H*.55);
    ctx.restore();

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize();
  draw();
}

const SB_FUNC_URL = 'https://vlhqkwwgmkriwojffced.supabase.co/functions/v1/backup-moked';

function loadBackupDefaults(){

function startBackupAutoTimer(){
  clearInterval(_backupTimer);
  const cfg=loadBackupDefaults();
  if(!cfg.enabled||!cfg.to) return;
  // check every 30 min if it's time to send
  _backupTimer=setInterval(async()=>{
    const now=new Date();
    if(now.getDay()===cfg.dayOfWeek && now.getHours()===cfg.hour && now.getMinutes()<30){
      const hist=JSON.parse(localStorage.getItem('moked_backup_history')||'[]');
      const today=now.toISOString().slice(0,10);
      if(!hist.find(h=>h.date===today)){
        await runBackup(cfg.to, true);
      }
    }
  }, 30*60*1000);
}

let _backupHistory=[];

async function runBackup(toEmail, silent=false){
  if(!toEmail){showAlert('יש להזין כתובת מייל','error');return;}
  if(!silent){
    const btn=document.getElementById('bk-send-btn');
    if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2"></i> שולח...';}
  }
  try{
    const res=await fetch(SB_FUNC_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
      body:JSON.stringify({to:toEmail})
    });
    // no-cors returns opaque response — assume success
    const entry={date:new Date().toISOString().slice(0,10),ts:new Date().toISOString(),to:toEmail,records:0,ok:true};
    _backupHistory=[entry,..._backupHistory].slice(0,50);
    localStorage.setItem('moked_backup_history',JSON.stringify(_backupHistory));
    if(!silent){
      render();
      showAlert(`✓ גיבוי נשלח ל-${toEmail}`,'success');
    }
  }catch(e){
    if(!silent) showAlert('שגיאה: '+e.message,'error');
  }
  if(!silent){const btn=document.getElementById('bk-send-btn');if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-send"></i> שלח עכשיו';}}
}

function formatWAPhone(phone){
  const digits=phone.replace(/[^0-9]/g,'');
  if(digits.startsWith('972')) return digits;
  if(digits.startsWith('0')) return '972'+digits.slice(1);
  return '972'+digits;
}

// ══ INACTIVITY ALERT ══
let _inactivityTimer=null;
let _inactivityShown={};

function isInactivityAllowed(){
  const now=new Date();
  const day=now.getDay();
  const hour=now.getHours();
  // תמיד חוסם שישי/שבת
  if(day===5||day===6) return false;
  const policy=_waPolicy||defaultWAPolicy();
  if((policy.blockedDays||[]).includes(day)) return false;
  return hour>=8 && hour<18;
}

function startInactivityTimer(){
  clearInterval(_inactivityTimer);
  _inactivityTimer=setInterval(()=>{
    if(S.adminLoggedIn && isInactivityAllowed()) checkInactivity();
  }, 10*60*1000); // check every 10 minutes
}

async function checkInactivity(){
  const filesWithInactivity = DB.files.filter(f=>f.inactivity_alert?.enabled&&f.inactivity_alert?.hours);
  if(!filesWithInactivity.length) return;

  const now = new Date();
  const alerts = [];

  await Promise.all(filesWithInactivity.map(async f=>{
    try{
      const hours = f.inactivity_alert.hours;
      const since = new Date(now.getTime() - hours*3600000).toISOString();
      // check last record created
      const recs = await GET('records',`?file_id=eq.${f.id}&created_at=gte.${encodeURIComponent(since)}&select=id&limit=1`);
      if(!recs.length){
        // no records in last X hours — check we haven't already alerted
        const key = f.id+'_'+Math.floor(now.getTime()/(hours*3600000));
        if(!_inactivityShown[key]){
          _inactivityShown[key]=true;
          const org=DB.orgs.find(x=>x.id===f.org_id);
          alerts.push({file:f, org, hours});
        }
      }
    }catch(e){}
  }));

  if(alerts.length) showInactivityPopup(alerts);

  // send WA for each alert
  for(const a of alerts){
    const dateStr=new Date().toLocaleDateString('he-IL');
    const defaultMsg=`מובמנט | ${dateStr}\nמנהל יקר הנציגים לא מבצעים את המשימה שהם קיבלו ממך.\nבקובץ "${a.file.name}" אין פעילות מעל ${a.hours} שעות\nתעצור כעת את המשמרת ותוודא שגם נציגים מהבית וגם נציגים במוקד מבצעים כל אחד 5 תיעודים כאלה ביום.\n\nאדיר סומך עלייך שזה יבוצע!`;
    const customMsg=a.file.inactivity_alert?.message||'';
    const msg=customMsg
      ? customMsg.replace('{תאריך}',dateStr).replace('{קובץ}',a.file.name).replace('{שעות}',String(a.hours))
      : defaultMsg;
    // send to wa_contacts of the file
    for(const contact of (a.file.wa_contacts||[])){
      try{ await sendWA(formatWAPhone(contact.phone), msg); }catch(e){}
    }
    // send to group
    try{
      await fetch(WA_API,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({phone:'120363429161263528@g.us',message:msg,source:'מערכת קבצים'})});
    }catch(e){}
  }
}

function showInactivityPopup(alerts){
  // play alert sound
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((freq,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=freq;
      osc.type='sine';
      gain.gain.setValueAtTime(0.3,ctx.currentTime+i*0.15);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.3);
      osc.start(ctx.currentTime+i*0.15);
      osc.stop(ctx.currentTime+i*0.15+0.3);
    });
  }catch(e){}

  // remove existing popup
  document.getElementById('inactivity-popup')?.remove();

  const popup=document.createElement('div');
  popup.id='inactivity-popup';
  popup.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;max-width:360px;background:#fff;border:2px solid #7c3aed;border-radius:16px;box-shadow:0 8px 40px rgba(124,58,237,.3);overflow:hidden;animation:chatPopIn .25s ease';

  const rows=alerts.map(a=>`
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f3f4f6">
      <i class="ti ti-clock-exclamation" style="color:#7c3aed;font-size:20px;flex-shrink:0"></i>
      <div>
        <div style="font-weight:700;font-size:13px">${esc(a.file.name)}</div>
        <div style="font-size:12px;color:#6b7280">אין פעילות מעל ${a.hours} שעות · ${esc(a.org?.name||'')}</div>
      </div>
      ${(a.file.alert_emails||[]).length?`<button onclick="sendInactivityEmail('${a.file.id}')" style="margin-right:auto;background:#7c3aed;border:none;color:#fff;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:11px;flex-shrink:0"><i class="ti ti-mail"></i> שלח</button>`:''}
    </div>`).join('');

  popup.innerHTML=`
    <div style="background:linear-gradient(135deg,#7c3aed,#a855f7);padding:12px 14px;display:flex;align-items:center;justify-content:space-between">
      <span style="color:#fff;font-weight:700;font-size:14px">⚠️ התראת חוסר פעילות</span>
      <button onclick="document.getElementById('inactivity-popup').remove()" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:20px;line-height:1">✕</button>
    </div>
    ${rows}
    <div style="padding:10px 14px;text-align:center">
      <button onclick="document.getElementById('inactivity-popup').remove()" style="background:#f3f4f6;border:none;border-radius:8px;padding:7px 20px;cursor:pointer;font-size:13px;font-weight:600">סגור</button>
    </div>`;

  document.body.appendChild(popup);

  // auto-close after 30 seconds
  setTimeout(()=>document.getElementById('inactivity-popup')?.remove(), 30000);

  // send emails
  alerts.forEach(a=>{
    if((a.file.alert_emails||[]).length) sendInactivityEmail(a.file.id);
  });
}

async function sendInactivityEmail(fileId){
  const f=DB.files.find(x=>x.id===fileId); if(!f) return;
  const emails=f.alert_emails||[]; if(!emails.length) return;
  const org=DB.orgs.find(x=>x.id===f.org_id);
  const hours=f.inactivity_alert?.hours||3;
  try{
    await fetch(EMAIL_FUNC_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
      body:JSON.stringify({
        to:emails,
        fileName:f.name,
        orgName:org?.name||'',
        breached:0,
        fieldLabel:`אין פעילות מעל ${hours} שעות`,
        days:0,
        subject:`⚠️ חוסר פעילות — ${f.name}`,
        customHtml:true
      })
    });
  }catch(e){}
}

// ══ EMAIL ALERT TIMER ══
let _emailTimers={};
let _emailLastSent={};

function startEmailAlertTimers(){
  // clear existing
  Object.values(_emailTimers).forEach(t=>clearInterval(t));
  _emailTimers={};
  // load last sent from localStorage
  try{ _emailLastSent=JSON.parse(localStorage.getItem('moked_email_last_sent')||'{}'); }catch(e){ _emailLastSent={}; }

  const policy=_waPolicy||defaultWAPolicy();

  DB.files.forEach(f=>{
    const interval=f.email_schedule?.intervalHours;
    if(!interval||interval===0) return;
    const emails=f.alert_emails||[];
    if(!emails.length) return;
    if(!f.alert_rule?.enabled||!f.alert_rule?.fieldId) return;

    _emailTimers[f.id]=setInterval(async()=>{
      // check working hours/days
      const now=new Date();
      const day=now.getDay();
      const hour=now.getHours();
      if(day===5||day===6) return; // שישי/שבת
      if((policy.blockedDays||[]).includes(day)) return;
      if(hour<(policy.startHour||8)||hour>=(policy.endHour||18)) return;

      // check if already sent in this interval window
      const windowKey=`${f.id}_${Math.floor(now.getTime()/(interval*3600000))}`;
      if(_emailLastSent[windowKey]) return;

      // check breaches
      try{
        const recs=await GET('records',`?file_id=eq.${f.id}&select=id,created_at,extra,admin_data`);
        const breached=recs.filter(r=>recordMatchesAlert(r,f)).length;
        if(!breached) return;
        await sendAlertEmail(f, breached);
        _emailLastSent[windowKey]=true;
        localStorage.setItem('moked_email_last_sent',JSON.stringify(_emailLastSent));
      }catch(e){}
    }, interval*3600000);
  });
}

async function testAlertEmail(email, name){
  const btn = event.target.closest('button');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="ti ti-loader-2"></i>'; }
  try{
    const res = await fetch(EMAIL_FUNC_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
      body:JSON.stringify({
        to:[email],
        fileName:'בדיקה — טופס לדוגמה',
        orgName:'מובמנט',
        breached:5,
        fieldLabel:'האם טופל',
        days:2
      })
    });
    const data = await res.json();
    addEmailLog(email,`בדיקה — ${name}`,data.ok);
    showAlert(data.ok?`✓ מייל בדיקה נשלח ל-${name}`:`שגיאה: ${JSON.stringify(data)}`,'success');
  }catch(e){ showAlert('שגיאה: '+e.message,'error'); }
  if(btn){ btn.disabled=false; btn.innerHTML='<i class="ti ti-send"></i> בדיקה'; }
}


async function sendAlertEmail(file, breachedCount){
  const emails = file.alert_emails||[];
  if(!emails.length) return;
  const org = DB.orgs.find(x=>x.id===file.org_id);
  const rule = file.alert_rule||{};
  const allFields = [...(file.extra_fields||[]),...(file.admin_fields||[])];
  const fieldLabel = (allFields.find(x=>x.id===rule.fieldId)||{}).label||'';
  const subject=`עדכון מובמנט — ${file.name}: ${breachedCount} ממתינות`;
  try{
    const res=await fetch(EMAIL_FUNC_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SB_KEY},
      body:JSON.stringify({to:emails,fileName:file.name,orgName:org?.name||'',breached:breachedCount,fieldLabel,days:rule.days||0})
    });
    const data=await res.json();
    addEmailLog(emails.join(', '),subject,data.ok);
  }catch(e){ console.warn('Email send failed:',e); addEmailLog(emails.join(', '),subject,false); }
}
